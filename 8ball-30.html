<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Ball Pro Scorekeeper</title>
    <style>
        :root {
            --lime: #CCFF00; 
            --bg: #0A0A0A; 
            --home: #00E5FF; 
            --away: #FF007F; 
            --card: #161616;
            --surface: #1E1E1E;
            --border: rgba(255, 255, 255, 0.08);
            --bg-r1: rgba(0, 229, 255, 0.08); 
            --bg-r2: rgba(255, 0, 127, 0.08); 
            --bg-r3: rgba(204, 255, 0, 0.08); 
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg); 
            color: #E0E0E0; 
            margin: 0; 
            padding: 0;
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Modern Header */
        .series-header {
            background: linear-gradient(to bottom, #1a1a1a, #0A0A0A);
            border-bottom: 1px solid var(--border);
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 12px 5px; 
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .match-box { 
            background: #000; 
            padding: 4px 14px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            font-size: 1.8rem; 
            font-weight: 900; 
            min-width: 60px;
            text-align: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        /* View Controls (Modern Chips) */
        .view-controls { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            padding: 10px; 
            background: transparent; 
            flex-shrink: 0; 
        }
        
        .view-btn { 
            background: var(--surface); 
            color: #888; 
            border: 1px solid var(--border); 
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .view-btn.active { 
            background: var(--lime); 
            color: #000; 
            border-color: var(--lime);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }

        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            padding: 10px; 
            scrollbar-width: none;
        }

        /* Team Cards */
        .team-zone { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 12px; 
            border: 1px solid var(--border); 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .h-accent { border-left: 4px solid var(--home); }
        .a-accent { border-left: 4px solid var(--away); }
        
        .team-header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            padding: 0 4px;
        }
        
        .team-name { 
            background: transparent; 
            border: none; 
            font-size: 1.1rem; 
            color: #fff; 
            font-weight: 800; 
            flex: 1; 
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .match-pts-pill { 
            background: rgba(255,255,255,0.05);
            color: #888; 
            font-weight: 900; 
            font-size: 0.7rem; 
            padding: 5px 10px; 
            border-radius: 8px; 
        }
        .match-pts-pill.complete { 
            color: var(--lime); 
            background: rgba(204, 255, 0, 0.1);
            border: 1px solid rgba(204, 255, 0, 0.2);
        }

        /* Table Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        th { color: #666; font-size: 0.55rem; text-transform: uppercase; padding: 4px; letter-spacing: 1px; }
        td { padding: 4px 2px; vertical-align: middle; }
        
        .col-r1 { border-radius: 4px 0 0 4px; background-color: var(--bg-r1); }
        .col-r2 { background-color: var(--bg-r2); }
        .col-r3 { border-radius: 0 4px 4px 0; background-color: var(--bg-r3); }
        .hide-col { display: none !important; }

        .player-input { 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #333; 
            color: #fff; 
            width: 95%; 
            padding: 4px 0; 
            font-size: 0.8rem; 
        }
        
        select { 
            background: #252525; 
            color: #fff; 
            border: 1px solid #333; 
            width: 100%; 
            padding: 6px 0; 
            border-radius: 6px;
            font-size: 0.9rem; 
            font-weight: 700; 
            text-align: center;
            appearance: none;
        }

        /* Badge Buttons */
        .badge-row { display: flex; gap: 2px; margin-top: 4px; padding: 0 2px; }
        .badge-btn { 
            flex: 1; 
            font-size: 0.5rem; 
            padding: 3px 0; 
            border-radius: 4px;
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #555; 
            font-weight: 800;
        }
        .badge-btn.active { background: var(--lime); color: #000; border-color: var(--lime); }
        
        /* Footers & Totals */
        tfoot { background: transparent; }
        .total-row { font-weight: 900; font-size: 0.85rem; text-align: center; height: 35px; color: #555; }
        .active-total { color: #fff; }
        .complete-round { color: var(--lime) !important; text-shadow: 0 0 10px rgba(204, 255, 0, 0.5); }

        .footer { 
            border-top: 1px solid var(--border); 
            padding: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            flex-shrink: 0; 
        }

        .submit-btn { 
            background: var(--lime); 
            color: #000; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 30px; 
            font-size: 0.9rem; 
            font-weight: 900; 
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(204, 255, 0, 0.4);
        }

        .voice-btn { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            color: #fff; 
            width: 28px; 
            height: 28px; 
            border-radius: 50%; 
            font-size: 0.7rem; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #summary-layer {
            backdrop-filter: blur(15px);
            background: rgba(0,0,0,0.92);
        }

        /* Utility */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="swipe-zone">

<div class="series-header">
    <div style="text-align:center"><div id="h-label" style="color:var(--home); font-size:0.6rem; font-weight:800; margin-bottom:4px">HOME</div><div class="match-box" id="h-series" style="color:var(--home)">0</div></div>
    <div style="color:var(--lime); font-weight:900; font-size: 0.7rem; letter-spacing: 2px;">MATCH SERIES</div>
    <div style="text-align:center"><div id="a-label" style="color:var(--away); font-size:0.6rem; font-weight:800; margin-bottom:4px">AWAY</div><div class="match-box" id="a-series" style="color:var(--away)">0</div></div>
</div>

<div class="view-controls">
    <button class="view-btn active" onclick="setView('all', this)">FULL VIEW</button>
    <button class="view-btn" onclick="setView(1, this)">ROUND 1</button>
    <button class="view-btn" onclick="setView(2, this)">ROUND 2</button>
    <button class="view-btn" onclick="setView(3, this)">ROUND 3</button>
</div>

<div class="main-content" id="scroll-container">
    <div class="team-zone h-accent">
        <div class="team-header-row">
            <button class="voice-btn" onclick="startVoice('h-title', 'h-label')">🎙</button>
            <input type="text" class="team-name" id="h-title" placeholder="HOME TEAM" oninput="document.getElementById('h-label').innerText = this.value">
            <div class="match-pts-pill" id="h-match-pill">PTS: <span id="h-grand-total">0</span></div>
        </div>
        <table>
            <thead><tr><th style="width:25%">PLAYER</th><th style="width:14%">SL</th><th class="col-r1">R1</th><th class="col-r2">R2</th><th class="col-r3">R3</th><th style="width:14%">HP</th></tr></thead>
            <tbody id="h-body"></tbody>
            <tfoot>
                <tr class="total-row active-total">
                    <td colspan="2" style="text-align:left; padding-left:10px; font-size:0.6rem; color:#666">H-CAP PTS</td>
                    <td id="h-hpt-1" class="col-r1">0</td><td id="h-hpt-2" class="col-r2">0</td><td id="h-hpt-3" class="col-r3">0</td>
                    <td style="font-size:0.5rem">SUM: <span id="h-hp-sum">0</span></td>
                </tr>
                <tr class="total-row" id="h-total-line">
                    <td colspan="2" style="text-align:left; padding-left:10px; color:var(--lime)">TOTAL RD</td>
                    <td id="h-rt-1" class="col-r1">0</td><td id="h-rt-2" class="col-r2">0</td><td id="h-rt-3" class="col-r3">0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="team-zone a-accent">
        <div class="team-header-row">
            <button class="voice-btn" onclick="startVoice('a-title', 'a-label')">🎙</button>
            <input type="text" class="team-name" id="a-title" placeholder="AWAY TEAM" oninput="document.getElementById('a-label').innerText = this.value">
            <div class="match-pts-pill" id="a-match-pill">PTS: <span id="a-grand-total">0</span></div>
        </div>
        <table>
            <thead><tr><th style="width:25%">PLAYER</th><th style="width:14%">SL</th><th class="col-r1">R1</th><th class="col-r2">R2</th><th class="col-r3">R3</th><th style="width:14%">HP</th></tr></thead>
            <tbody id="a-body"></tbody>
            <tfoot>
                <tr class="total-row active-total">
                    <td colspan="2" style="text-align:left; padding-left:10px; font-size:0.6rem; color:#666">H-CAP PTS</td>
                    <td id="a-hpt-1" class="col-r1">0</td><td id="a-hpt-2" class="col-r2">0</td><td id="a-hpt-3" class="col-r3">0</td>
                    <td style="font-size:0.5rem">SUM: <span id="a-hp-sum">0</span></td>
                </tr>
                <tr class="total-row" id="a-total-line">
                    <td colspan="2" style="text-align:left; padding-left:10px; color:var(--lime)">TOTAL RD</td>
                    <td id="a-rt-1" class="col-r1">0</td><td id="a-rt-2" class="col-r2">0</td><td id="a-rt-3" class="col-r3">0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<div class="footer">
    <button onclick="location.reload()" style="background:transparent; color:#666; border:none; padding:8px; font-size:0.7rem; font-weight:700">RESET ALL</button>
    <div style="font-weight:900; font-size: 1.1rem; color: #FFF; letter-spacing: 1px" id="live-final-display">0 - 0</div>
    <button class="submit-btn" onclick="processMatch()">SUBMIT</button>
</div>

<div id="summary-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; display:none; z-index:1000; padding:20px; flex-direction:column;">
    <div id="tsv-text" style="flex:1; background:#000; color:#0f0; border:1px solid #333; border-radius:15px; font-family:monospace; font-size:0.75rem; padding:15px; overflow:auto; white-space:pre; border: 1px solid var(--lime);"></div>
    <button style="margin-top:15px; padding:18px; background:var(--lime); color:#000; border:none; border-radius:15px; font-weight:900; letter-spacing:1px" onclick="sendText()">SEND AS TEXT MESSAGE</button>
    <button style="margin-top:10px; padding:12px; background:transparent; color:#888; border:none; font-weight:700" onclick="document.getElementById('summary-layer').style.display='none'">CLOSE SUMMARY</button>
</div>

<script>
    // CORE LOGIC REMAINS UNTOUCHED AS REQUESTED
    function setView(round, btn) {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const r1 = document.querySelectorAll('.col-r1'), r2 = document.querySelectorAll('.col-r2'), r3 = document.querySelectorAll('.col-r3');
        [r1, r2, r3].forEach(l => l.forEach(el => el.classList.add('hide-col')));
        if (round === 'all') [r1, r2, r3].forEach(l => l.forEach(el => el.classList.remove('hide-col')));
        else if (round === 1) r1.forEach(el => el.classList.remove('hide-col'));
        else if (round === 2) r2.forEach(el => el.classList.remove('hide-col'));
        else if (round === 3) r3.forEach(el => el.classList.remove('hide-col'));
    }

    const mpt = () => { let s=""; for(let i=0; i<=10; i++) { if(i===8 || i===9) continue; s+=`<option value="${i}">${i}</option>`; } return s; };
    const msl = () => { let s=""; for(let i=0; i<=10; i++) s+=`<option value="${i}">${i}</option>`; return s; };

    function createUI(side) {
        let rows = ""; let slO = msl(), ptO = mpt();
        for(let i=1; i<=5; i++) {
            rows += `<tr>
                <td><input type="text" class="player-input" id="${side}-n-${i}" placeholder="PLAYER ${i}"></td>
                <td><select id="${side}-sl-${i}" onchange="calcHandicap()">${slO}</select></td>
                ${[1,2,3].map(r => `<td class="col-r${r}">
                    <select class="${side}-pts-r${r}" id="${side}-r${r}-${i}" onchange="handleScoreChange('${side}', ${r}, ${i}, this.value)">${ptO}</select>
                    <div class="badge-row">
                        <button class="badge-btn b8" onclick="toggleBadge(this, '${side}-r${r}-${i}', '${side}', ${r}, ${i})">8BB</button>
                        <button class="badge-btn be" onclick="toggleBadge(this, '${side}-r${r}-${i}', '${side}', ${r}, ${i})">ERO</button>
                    </div>
                </td>`).join('')}
                <td id="${side}-hp-${i}" style="text-align:center; font-weight:900; font-size:0.85rem">0</td>
            </tr>`;
        }
        document.getElementById(side+'-body').innerHTML = rows;
    }

    function toggleBadge(btn, selId, side, round, index) {
        const isAct = btn.classList.contains('active');
        const oppSide = side === 'h' ? 'a' : 'h';
        const oppEl = document.getElementById(`${oppSide}-r${round}-${index}`);

        if (!isAct) {
            if (parseInt(oppEl.value) === 10) {
                if (!confirm("Opponent already has 10. Switch winner?")) return;
                oppEl.value = 0;
            }
            btn.parentElement.querySelectorAll('.badge-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(selId).value = 10;
            oppEl.value = 0;
        } else {
            btn.classList.remove('active');
        }
        updateLiveTotals();
    }

    function handleScoreChange(side, round, index, value) {
        const val = parseInt(value);
        const oppSide = side === 'h' ? 'a' : 'h';
        const oppEl = document.getElementById(`${oppSide}-r${round}-${index}`);
        const oppVal = parseInt(oppEl.value);

        if (val === 10 && oppVal === 10) {
            if (confirm("Opponent already has 10. Switch winner?")) {
                oppEl.value = 0;
            } else {
                document.getElementById(`${side}-r${round}-${index}`).value = 0;
            }
        } else if (val >= 0 && val <= 7) {
            oppEl.value = 10;
        }
        updateLiveTotals();
    }

    function calcHandicap() {
        for(let i=1; i<=5; i++) {
            let h = parseInt(document.getElementById(`h-sl-${i}`).value), a = parseInt(document.getElementById(`a-sl-${i}`).value);
            document.getElementById(`h-hp-${i}`).innerText = (h-a) < 0 ? Math.min(Math.abs(h-a), 3) : "0";
            document.getElementById(`a-hp-${i}`).innerText = (h-a) > 0 ? Math.min(h-a, 3) : "0";
        }
        ['h','a'].forEach(p => {
            let pHP = 0; for(let i=1; i<=5; i++) pHP += parseInt(document.getElementById(`${p}-hp-${i}`).innerText);
            [1,2,3].forEach(r => document.getElementById(`${p}-hpt-${r}`).innerText = pHP);
            document.getElementById(`${p}-hp-sum`).innerText = pHP * 3;
        });
        updateLiveTotals();
    }

    function updateLiveTotals() {
        let hSeriesScore = 0, aSeriesScore = 0;
        for(let r=1; r<=3; r++) {
            let hPlayerPts = 0, aPlayerPts = 0, rFilled = false;
            for(let i=1; i<=5; i++) {
                let hv = parseInt(document.getElementById(`h-r${r}-${i}`).value);
                let av = parseInt(document.getElementById(`a-r${r}-${i}`).value);
                if(hv > 0 || av > 0) rFilled = true;
                hPlayerPts += hv; aPlayerPts += av;
            }
            let hHP = parseInt(document.getElementById(`h-hpt-${r}`).innerText);
            let aHP = parseInt(document.getElementById(`a-hpt-${r}`).innerText);
            document.getElementById(`h-rt-${r}`).innerText = hPlayerPts + hHP;
            document.getElementById(`a-rt-${r}`).innerText = aPlayerPts + aHP;
            if(rFilled) {
                document.getElementById(`h-rt-${r}`).classList.add('complete-round');
                document.getElementById(`a-rt-${r}`).classList.add('complete-round');
                if((hPlayerPts + hHP) > (aPlayerPts + aHP)) hSeriesScore++;
                else if((aPlayerPts + aHP) > (hPlayerPts + hHP)) aSeriesScore++;
            }
        }
        const hGrand = [...document.querySelectorAll('#h-total-line td[id^="h-rt-"]')].reduce((a,b)=>a+parseInt(b.innerText),0);
        const aGrand = [...document.querySelectorAll('#a-total-line td[id^="a-rt-"]')].reduce((a,b)=>a+parseInt(b.innerText),0);
        document.getElementById('h-grand-total').innerText = hGrand;
        document.getElementById('a-grand-total').innerText = aGrand;
        if(hGrand > 0 || aGrand > 0) {
            if(hGrand > aGrand) hSeriesScore++;
            else if(aGrand > hGrand) aSeriesScore++;
        }
        document.getElementById('h-series').innerText = hSeriesScore;
        document.getElementById('a-series').innerText = aSeriesScore;
        document.getElementById('live-final-display').innerText = `${hGrand} - ${aGrand}`;
    }

    function processMatch() {
        const hName = document.getElementById('h-title').value || "HOME";
        const aName = document.getElementById('a-title').value || "AWAY";
        const hSeries = document.getElementById('h-series').innerText;
        const aSeries = document.getElementById('a-series').innerText;
        const hGrandTotal = document.getElementById('h-grand-total').innerText;
        const aGrandTotal = document.getElementById('a-grand-total').innerText;

        let winnerStr = (parseInt(hSeries) > parseInt(aSeries)) 
            ? `${hName} wins series ${hSeries}-${aSeries} (${hGrandTotal}-${aGrandTotal})` 
            : (parseInt(aSeries) > parseInt(hSeries))
                ? `${aName} wins series ${aSeries}-${hSeries} (${aGrandTotal}-${hGrandTotal})`
                : `Series Tied ${hSeries}-${aSeries} (${hGrandTotal}-${aGrandTotal})`;

        let report = `${winnerStr}\n`;

        const compileTeam = (side, teamLabel) => {
            let section = `\n${teamLabel} STATS:\n`;
            const r1 = document.getElementById(`${side}-rt-1`).innerText;
            const r2 = document.getElementById(`${side}-rt-2`).innerText;
            const r3 = document.getElementById(`${side}-rt-3`).innerText;
            const r4 = document.getElementById(`${side}-grand-total`).innerText;
            
            let r1Comp = document.getElementById(`${side}-rt-1`).classList.contains('complete-round');
            let r2Comp = document.getElementById(`${side}-rt-2`).classList.contains('complete-round');
            let r3Comp = document.getElementById(`${side}-rt-3`).classList.contains('complete-round');
            
            section += `Rd1=${r1} Rd2=${r2} Rd3=${r3}`;
            if(r1Comp && r2Comp && r3Comp) {
                section += ` Rd4=${r4}`;
            }
            section += `\n`;

            for (let i = 1; i <= 5; i++) {
                const pName = document.getElementById(`${side}-n-${i}`).value || `Player ${i}`;
                const pr1 = document.getElementById(`${side}-r1-${i}`).value;
                const pr2 = document.getElementById(`${side}-r2-${i}`).value;
                const pr3 = document.getElementById(`${side}-r3-${i}`).value;
                const pSum = parseInt(pr1) + parseInt(pr2) + parseInt(pr3);
                
                let badges = "";
                for (let r = 1; r <= 3; r++) {
                    const cell = document.getElementById(`${side}-r${r}-${i}`).parentElement;
                    if (cell.querySelector('.b8').classList.contains('active')) badges += " (8BB)";
                    if (cell.querySelector('.be').classList.contains('active')) badges += " (ERO)";
                }
                section += `${pName} [R1:${pr1} R2:${pr2} R3:${pr3} Sum:${pSum}]${badges}\n`;
                section += `----------------------------------------\n`;
            }
            return section;
        };

        report += compileTeam('h', hName);
        report += "________________________________________\n";
        report += compileTeam('a', aName);

        document.getElementById('tsv-text').innerText = report;
        document.getElementById('summary-layer').style.display = 'flex';
    }

    function sendText() {
        const body = document.getElementById('tsv-text').innerText;
        window.location.href = `sms:?&body=${encodeURIComponent(body)}`;
    }

    createUI('h'); createUI('a');
</script>
</body>
</html>
