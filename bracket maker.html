<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Maker TV</title>
    <style>
        :root { --primary: #00cc66; --bg: #0a0a0a; --surface: #1a1a1a; --text: #fff; --accent: #ffcc00; --border-thick: 5px; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .tv-mode { font-size: 28px; }
        .container { padding: 20px; max-width: 1400px; margin: auto; }
        
        /* THE FIX: Standardize all focusables as real buttons/inputs */
        button, input, select, textarea { 
            border: var(--border-thick) solid #444; 
            background: #222;
            color: white;
            padding: 15px;
            font-size: inherit;
            border-radius: 8px;
            display: block;
            width: 100%;
            cursor: pointer;
        }

        /* TIZEN FOCUS HIGHLIGHT */
        button:focus, input:focus, select:focus, textarea:focus { 
            outline: none;
            border-color: var(--accent) !important;
            background: var(--primary) !important; 
            color: #000 !important;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent);
        }

        .header { display: flex; justify-content: space-between; padding: 20px; background: var(--surface); border-bottom: 6px solid var(--primary); align-items: center; }
        .bracket-scroll { display: flex; overflow-x: auto; gap: 40px; padding: 20px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 280px; }
        .match { background: #262626; margin: 15px 0; border-radius: 8px; border-left: 12px solid var(--accent); }
        .player-btn { text-align: left; border: none; border-bottom: 2px solid #444; border-radius: 0; width: 100%; }
        .winner-highlight { background: var(--primary) !important; color: #000; font-weight: bold; }
        .hidden { display: none !important; }
        
        /* Chip specific */
        .chip-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .match-area { background: #222; padding: 15px; border: 4px solid var(--primary); border-radius: 10px; }
        #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body class="tv-mode">

<div id="winner-overlay" class="hidden">
    <div style="font-size: 150px;">🏆</div>
    <div id="champion-display" style="font-size: 80px; font-weight: bold; color: var(--primary);">WINNER</div>
    <button style="width: auto; margin-top: 40px; background: var(--accent); color: #000;" onclick="location.reload()">NEW TOURNAMENT</button>
</div>

<div class="header">
    <div style="font-weight: bold;">🎱 BRACKET MAKER TV</div>
    <div style="display: flex; gap: 10px;">
        <button id="undo-chip-btn" class="hidden" style="width: auto;" onclick="undoChipAction()">⏪ UNDO</button>
        <button style="width: auto; background:#ff4444" onclick="location.reload()">RESET</button>
    </div>
</div>

<div class="container">
    <div id="setup-view">
        <select id="tourney-type" onchange="toggleSetupMode()">
            <option value="single">Single Elimination</option>
            <option value="double">Double Elimination</option>
            <option value="chip">Chip Tournament</option>
        </select>
        <div id="bulk-names" style="margin-top: 20px;">
            <textarea id="name-list" rows="8" placeholder="Names (one per line)"></textarea>
            <button style="margin-top: 15px; background: var(--accent); color:black" onclick="randomizeNames()">🎲 RANDOM DRAW</button>
        </div>
        <div id="individual-names" class="hidden" style="margin-top: 20px;">
            <div id="player-rows-container"></div>
        </div>
        <button style="margin-top: 30px; background: var(--primary); height: 80px;" onclick="startTourney()">START</button>
    </div>

    <div id="bracket-view" class="hidden">
        <div id="bracket-render" class="bracket-scroll"></div>
        <div id="losers-section" class="hidden">
            <h2 style="color:var(--accent); margin-left: 20px;">Losers Bracket</h2>
            <div id="losers-render" class="bracket-scroll"></div>
        </div>
    </div>

    <div id="chip-view" class="hidden">
        <div class="chip-layout">
            <div id="chip-tables-container" class="tables-grid"></div>
            <div id="chip-queue-render" style="background: var(--surface); padding: 15px; border: 2px solid #444;"></div>
        </div>
    </div>
</div>

<script>
    let players = []; let queue = []; let activeMatches = [[], [], [], [], []];
    let mode = 'single'; let grandFinalsReset = false;

    function toggleSetupMode() {
        const type = document.getElementById('tourney-type').value;
        document.getElementById('bulk-names').classList.toggle('hidden', type === 'chip');
        document.getElementById('individual-names').classList.toggle('hidden', type !== 'chip');
        if(type === 'chip') {
            const container = document.getElementById('player-rows-container');
            container.innerHTML = '';
            for(let i=0; i<8; i++) {
                container.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:5px">
                    <input type="text" placeholder="Name" class="p-name">
                    <input type="number" value="3" style="width:80px" class="p-chips">
                </div>`;
            }
        }
    }

    function startTourney() {
        mode = document.getElementById('tourney-type').value;
        if(mode === 'chip') {
            document.querySelectorAll('#player-rows-container > div').forEach(div => {
                const name = div.querySelector('.p-name').value.trim();
                const chips = parseInt(div.querySelector('.p-chips').value);
                if(name) players.push({ name, chips, streak: 0, id: Math.random() });
            });
            queue = [...players];
            document.getElementById('chip-view').classList.remove('hidden');
            refreshChipUI();
        } else {
            document.getElementById('name-list').value.split('\n').filter(n => n.trim()).forEach(n => {
                players.push({ name: n.trim(), id: Math.random() });
            });
            document.getElementById('bracket-view').classList.remove('hidden');
            setupBrackets();
        }
        document.getElementById('setup-view').classList.add('hidden');
    }

    function setupBrackets() {
        const rounds = Math.ceil(Math.log2(players.length));
        renderBracket('bracket-render', 'W', rounds);
        if(mode === 'double') {
            document.getElementById('losers-section').classList.remove('hidden');
            renderBracket('losers-render', 'L', rounds);
            const gf = document.createElement('div'); gf.className = 'round';
            gf.innerHTML = `<div class="match" id="GF-match">
                <div id="gf-status" style="font-size:0.6em; text-align:center; background:red">GRAND FINAL</div>
                <button class="player-btn" onclick="advBr('GF',0,0,0)">Winner Champ</button>
                <button class="player-btn" onclick="advBr('GF',0,0,1)">Loser Champ</button>
            </div>`;
            document.getElementById('bracket-render').appendChild(gf);
        }
        const slots = document.querySelectorAll('#bracket-render .round:first-child .player-btn');
        players.forEach((p, i) => { if(slots[i]) { slots[i].dataset.name = p.name; slots[i].innerText = p.name; } });
    }

    function renderBracket(id, prefix, rounds) {
        const cont = document.getElementById(id);
        for(let r=0; r<rounds; r++) {
            const rd = document.createElement('div'); rd.className = 'round';
            let mCount = Math.pow(2, rounds - r - 1);
            for(let m=0; m<mCount; m++) {
                rd.innerHTML += `<div class="match" id="${prefix}-r${r}-m${m}">
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},0)">TBD</button>
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},1)">TBD</button>
                </div>`;
            }
            cont.appendChild(rd);
        }
    }

    function advBr(br, r, m, sIdx) {
        const matchEl = br === 'GF' ? document.getElementById('GF-match') : document.getElementById(`${br}-r${r}-m${m}`);
        const pEls = matchEl.querySelectorAll('.player-btn');
        const win = pEls[sIdx]; const lose = pEls[sIdx === 0 ? 1 : 0];
        if(win.innerText === 'TBD') return;

        // Double Win Logic for Grand Final
        if(br === 'GF' && sIdx === 1 && !grandFinalsReset) {
            grandFinalsReset = true;
            document.getElementById('gf-status').innerText = "MATCH 2 (RESET)";
            pEls.forEach(p => p.classList.remove('winner-highlight'));
            return;
        }

        win.classList.add('winner-highlight');
        lose.style.opacity = "0.3";

        // Losers move logic
        if(mode === 'double' && br === 'W') {
            const lSlots = document.querySelectorAll('#losers-render .round:first-child .player-btn');
            for(let s of lSlots) { if(s.innerText === 'TBD') { s.dataset.name = lose.dataset.name; s.innerText = lose.innerText; break; } }
        }

        const nr = document.getElementById(`${br}-r${r+1}-m${Math.floor(m/2)}`);
        if(nr) {
            const target = nr.querySelectorAll('.player-btn')[m%2];
            target.dataset.name = win.dataset.name; target.innerText = win.innerText;
        } else if(br === 'W' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[0];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(br === 'L' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[1];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(mode === 'single' || br === 'GF') showChamp(win.dataset.name);
    }

    function refreshChipUI() {
        const grid = document.getElementById('chip-tables-container');
        for(let i=0; i<5; i++) { while(activeMatches[i].length < 2 && queue.length > 0) activeMatches[i].push(queue.shift()); }
        grid.innerHTML = activeMatches.map((m, idx) => `
            <div class="match-area">Table ${idx+1}
                ${m.length === 2 ? `
                <button onclick="chipWinner(${idx},0)">${m[0].name} [${m[0].chips}]</button>
                <button onclick="chipWinner(${idx},1)" style="margin-top:10px">${m[1].name} [${m[1].chips}]</button>` : '<div>Waiting...</div>'}
            </div>`).join('');
        document.getElementById('chip-queue-render').innerHTML = "Queue: " + queue.map(p => p.name).join(', ');
    }

    function chipWinner(tIdx, wIdx) {
        const m = activeMatches[tIdx]; const w = m[wIdx]; const l = m[wIdx===0?1:0];
        l.chips--; if(l.chips > 0) queue.push(l);
        w.streak++; if(w.streak >= 3) { w.streak = 0; queue.push(w); activeMatches[tIdx] = []; } else activeMatches[tIdx] = [w];
        refreshChipUI();
    }

    function showChamp(n) { document.getElementById('champion-display').innerText = n; document.getElementById('winner-overlay').classList.remove('hidden'); }
    function randomizeNames() { let l = document.getElementById('name-list').value.split('\n').filter(n => n.trim()); l.sort(() => Math.random() - 0.5); document.getElementById('name-list').value = l.join('\n'); }

    // UNIVERSAL NAVIGATION FOR TV
    document.addEventListener('keydown', (e) => {
        const focusables = Array.from(document.querySelectorAll('button, input, textarea, select'));
        let index = focusables.indexOf(document.activeElement);

        if (e.keyCode === 38 || e.keyCode === 37) { // Up/Left
            if (index > 0) focusables[index - 1].focus();
            else focusables[focusables.length - 1].focus();
            e.preventDefault();
        } else if (e.keyCode === 40 || e.keyCode === 39) { // Down/Right
            if (index < focusables.length - 1) focusables[index + 1].focus();
            else focusables[0].focus();
            e.preventDefault();
        }
    });

    window.onload = () => document.querySelector('select')?.focus();
</script>
</body>
</html>
