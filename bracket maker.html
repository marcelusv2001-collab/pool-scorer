<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Maker TV</title>
    <style>
        :root { --primary: #00cc66; --bg: #0a0a0a; --surface: #1a1a1a; --text: #fff; --accent: #ffcc00; --border-thick: 6px; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .tv-mode { font-size: 30px; }
        
        /* THE FOCUS ENGINE CSS */
        button, input, textarea, select { 
            border: var(--border-thick) solid #444 !important; 
            background: #222; 
            color: white; 
            padding: 20px; 
            font-size: 1em; 
            border-radius: 12px; 
            display: block; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.2s;
        }

        /* SUPER BRIGHT FOCUS FOR TV BRIGHTNESS */
        button:focus, input:focus, textarea:focus, select:focus { 
            outline: none !important;
            border-color: var(--accent) !important;
            background: var(--primary) !important; 
            color: #000 !important;
            transform: scale(1.08);
            box-shadow: 0 0 30px var(--accent);
            z-index: 10;
        }

        /* TAB SYSTEM */
        .tab-bar { display: flex; background: #000; padding: 10px; gap: 10px; border-bottom: 4px solid var(--primary); }
        .tab-btn { width: auto; flex: 1; background: #333; }

        .header { padding: 15px 30px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px; height: 80vh; overflow-y: auto; }
        
        .match { background: #262626; margin: 20px 0; border-radius: 15px; border-left: 15px solid var(--accent); overflow: hidden; }
        .player-btn { text-align: left; border: none !important; border-bottom: 2px solid #444 !important; border-radius: 0; }
        .winner-highlight { background: var(--primary) !important; color: #000 !important; font-weight: 900; }
        
        .hidden { display: none !important; }
        #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bracket-scroll { display: flex; gap: 50px; padding: 20px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 300px; }
    </style>
</head>
<body class="tv-mode">

<div id="winner-overlay" class="hidden">
    <div style="font-size: 200px;">🏆</div>
    <div id="champion-display" style="font-size: 100px; font-weight: bold; color: var(--primary);">WINNER</div>
    <button style="width: 400px; background: var(--accent); color: #000;" onclick="location.reload()">NEW TOURNAMENT</button>
</div>

<div class="tab-bar">
    <button class="tab-btn" onclick="switchView('setup-view')">1. SETUP</button>
    <button class="tab-btn" onclick="switchView('bracket-view')">2. BRACKET</button>
    <button class="tab-btn" onclick="switchView('chip-view')">3. CHIPS</button>
</div>

<div class="header">
    <div style="font-weight: 900; letter-spacing: 2px;">🎱 BRACKET MAKER TV</div>
    <button style="width: auto; background: #ff4444;" onclick="location.reload()">RESET ALL</button>
</div>

<div class="container" id="main-container">
    <div id="setup-view">
        <select id="tourney-type" onchange="toggleSetupMode()">
            <option value="single">Single Elimination</option>
            <option value="double">Double Elimination</option>
            <option value="chip">Chip Tournament</option>
        </select>
        <div id="bulk-names" style="margin-top: 20px;">
            <textarea id="name-list" rows="5" placeholder="Enter Names (One per line)"></textarea>
            <button style="margin-top: 20px; background: var(--accent); color:#000" onclick="randomizeNames()">🎲 SHUFFLE NAMES</button>
        </div>
        <div id="individual-names" class="hidden" style="margin-top: 20px;">
            <div id="player-rows-container"></div>
        </div>
        <button style="margin-top: 40px; background: var(--primary); height: 100px; font-size: 1.5em;" onclick="startTourney()">START TOURNAMENT</button>
    </div>

    <div id="bracket-view" class="hidden">
        <div id="bracket-render" class="bracket-scroll"></div>
        <div id="losers-section" class="hidden">
            <h2 style="color:var(--accent); margin-top: 50px;">Losers Bracket</h2>
            <div id="losers-render" class="bracket-scroll"></div>
        </div>
    </div>

    <div id="chip-view" class="hidden">
        <div id="chip-tables-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
    </div>
</div>

<script>
    let players = []; let queue = []; let activeMatches = [[], [], [], [], []];
    let mode = 'single'; let grandFinalsReset = false;

    // VIEW SWITCHER
    function switchView(viewId) {
        ['setup-view', 'bracket-view', 'chip-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
        // Reset focus to top of new view
        setTimeout(focusFirst, 100);
    }

    function toggleSetupMode() {
        const type = document.getElementById('tourney-type').value;
        document.getElementById('bulk-names').classList.toggle('hidden', type === 'chip');
        document.getElementById('individual-names').classList.toggle('hidden', type !== 'chip');
        if(type === 'chip') {
            const container = document.getElementById('player-rows-container');
            container.innerHTML = '';
            for(let i=0; i<8; i++) {
                container.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px"><input type="text" placeholder="Player ${i+1}" class="p-name"><input type="number" value="3" style="width:120px" class="p-chips"></div>`;
            }
        }
    }

    function startTourney() {
        mode = document.getElementById('tourney-type').value;
        players = [];
        if(mode === 'chip') {
            document.querySelectorAll('#player-rows-container > div').forEach(div => {
                const name = div.querySelector('.p-name').value.trim();
                const chips = parseInt(div.querySelector('.p-chips').value);
                if(name) players.push({ name, chips, id: Math.random() });
            });
            queue = [...players];
            switchView('chip-view');
            refreshChipUI();
        } else {
            document.getElementById('name-list').value.split('\n').filter(n => n.trim()).forEach(n => {
                players.push({ name: n.trim(), id: Math.random() });
            });
            switchView('bracket-view');
            setupBrackets();
        }
    }

    function setupBrackets() {
        const rounds = Math.ceil(Math.log2(players.length));
        renderBracket('bracket-render', 'W', rounds);
        if(mode === 'double') {
            document.getElementById('losers-section').classList.remove('hidden');
            renderBracket('losers-render', 'L', rounds);
            const gf = document.createElement('div'); gf.className = 'round';
            gf.innerHTML = `<div class="match" id="GF-match">
                <div id="gf-status" style="background:red; font-size: 0.5em; text-align:center">GRAND FINAL</div>
                <button class="player-btn" onclick="advBr('GF',0,0,0)">Winner Champ</button>
                <button class="player-btn" onclick="advBr('GF',0,0,1)">Loser Champ</button>
            </div>`;
            document.getElementById('bracket-render').appendChild(gf);
        }
        const slots = document.querySelectorAll('#bracket-render .round:first-child .player-btn');
        players.forEach((p, i) => { if(slots[i]) { slots[i].dataset.name = p.name; slots[i].innerText = p.name; } });
    }

    function renderBracket(id, prefix, rounds) {
        const cont = document.getElementById(id);
        for(let r=0; r<rounds; r++) {
            const rd = document.createElement('div'); rd.className = 'round';
            let mCount = Math.pow(2, rounds - r - 1);
            for(let m=0; m<mCount; m++) {
                rd.innerHTML += `<div class="match" id="${prefix}-r${r}-m${m}">
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},0)">TBD</button>
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},1)">TBD</button>
                </div>`;
            }
            cont.appendChild(rd);
        }
    }

    function advBr(br, r, m, sIdx) {
        const matchEl = br === 'GF' ? document.getElementById('GF-match') : document.getElementById(`${br}-r${r}-m${m}`);
        const pEls = matchEl.querySelectorAll('.player-btn');
        const win = pEls[sIdx]; const lose = pEls[sIdx === 0 ? 1 : 0];
        if(win.innerText === 'TBD') return;

        if(br === 'GF' && sIdx === 1 && !grandFinalsReset) {
            grandFinalsReset = true;
            document.getElementById('gf-status').innerText = "MATCH 2 (RESET)";
            pEls.forEach(p => p.classList.remove('winner-highlight'));
            return;
        }

        win.classList.add('winner-highlight');
        lose.style.opacity = "0.2";

        if(mode === 'double' && br === 'W') {
            const lSlots = document.querySelectorAll('#losers-render .round:first-child .player-btn');
            for(let s of lSlots) { if(s.innerText === 'TBD') { s.dataset.name = lose.dataset.name; s.innerText = lose.innerText; break; } }
        }

        const nr = document.getElementById(`${br}-r${r+1}-m${Math.floor(m/2)}`);
        if(nr) {
            const target = nr.querySelectorAll('.player-btn')[m%2];
            target.dataset.name = win.dataset.name; target.innerText = win.innerText;
        } else if(br === 'W' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[0];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(br === 'L' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[1];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(mode === 'single' || br === 'GF') showChamp(win.dataset.name);
    }

    function refreshChipUI() {
        const grid = document.getElementById('chip-tables-container');
        for(let i=0; i<4; i++) { while(activeMatches[i].length < 2 && queue.length > 0) activeMatches[i].push(queue.shift()); }
        grid.innerHTML = activeMatches.map((m, idx) => `
            <div style="background:#222; padding:15px; border:2px solid var(--primary); border-radius:15px">
                <div style="text-align:center; margin-bottom:10px">Table ${idx+1}</div>
                ${m.length === 2 ? `
                <button class="player-btn" onclick="chipWinner(${idx},0)">${m[0].name} [${m[0].chips}]</button>
                <button class="player-btn" onclick="chipWinner(${idx},1)">${m[1].name} [${m[1].chips}]</button>` : '<div>Empty</div>'}
            </div>`).join('');
    }

    function chipWinner(tIdx, wIdx) {
        const m = activeMatches[tIdx]; const w = m[wIdx]; const l = m[wIdx===0?1:0];
        l.chips--; if(l.chips > 0) queue.push(l);
        activeMatches[tIdx] = [w]; // Winner stays
        refreshChipUI();
    }

    function showChamp(n) { document.getElementById('champion-display').innerText = n; document.getElementById('winner-overlay').classList.remove('hidden'); }
    function randomizeNames() { let l = document.getElementById('name-list').value.split('\n').filter(n => n.trim()); l.sort(() => Math.random() - 0.5); document.getElementById('name-list').value = l.join('\n'); }

    // TIZEN-SPECIFIC "VIRTUAL LIST" NAVIGATION
    document.addEventListener('keydown', (e) => {
        // Find all focusable elements currently visible in the active view + tabs
        const focusables = Array.from(document.querySelectorAll('button, input, textarea, select'))
            .filter(el => {
                const style = window.getComputedStyle(el);
                return style.display !== 'none' && style.visibility !== 'hidden' && el.offsetParent !== null;
            });
            
        let index = focusables.indexOf(document.activeElement);

        if (e.keyCode === 37 || e.keyCode === 38) { // Left or Up
            e.preventDefault();
            const prev = index > 0 ? index - 1 : focusables.length - 1;
            focusables[prev].focus();
            focusables[prev].scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else if (e.keyCode === 39 || e.keyCode === 40) { // Right or Down
            e.preventDefault();
            const next = index < focusables.length - 1 ? index + 1 : 0;
            focusables[next].focus();
            focusables[next].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });

    function focusFirst() { document.querySelector('button, select, textarea')?.focus(); }
    window.onload = focusFirst;
</script>
</body>
</html>
