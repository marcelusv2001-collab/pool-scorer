<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Maker TV</title>
    <style>
        :root { --primary: #00cc66; --bg: #0a0a0a; --surface: #1a1a1a; --text: #fff; --accent: #ffcc00; --border-thick: 6px; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        body.tv-mode { font-size: 28px; }
        body.mobile-mode { font-size: 16px; }

        /* INTERACTIVE ELEMENTS */
        button, input, textarea, select { 
            border: var(--border-thick) solid #444 !important; 
            background: #222; 
            color: white; 
            padding: 15px; 
            font-size: 1em; 
            border-radius: 10px; 
            display: block; 
            width: 100%; 
            box-sizing: border-box;
        }

        /* TV FOCUS STATE */
        button:focus, input:focus, textarea:focus, select:focus { 
            outline: none !important;
            border-color: var(--accent) !important;
            background: var(--primary) !important; 
            color: #000 !important;
            transform: scale(1.03);
            box-shadow: 0 0 25px var(--accent);
            z-index: 10;
        }

        .header { padding: 20px 30px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--primary); }
        .container { padding: 30px; max-width: 1400px; margin: auto; }
        
        .counter-box { background: var(--primary); color: #000; padding: 5px 25px; border-radius: 25px; font-weight: bold; border: 3px solid #000; }
        
        /* BRACKET */
        .bracket-scroll { display: flex; gap: 40px; padding: 20px; overflow-x: auto; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 300px; }
        .match { background: #262626; margin: 15px 0; border-radius: 12px; border-left: 15px solid var(--accent); overflow: hidden; }
        .player-btn { text-align: left; border: none !important; border-bottom: 2px solid #444 !important; border-radius: 0; }
        .winner-highlight { background: var(--primary) !important; color: #000 !important; font-weight: 900; }
        
        .hidden { display: none !important; }
        .reset-badge { font-size: 0.6em; background: #ff4444; color: white; padding: 5px 10px; text-align: center; }
        
        /* CHIPS */
        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .table-card { background: #222; padding: 15px; border: 4px solid var(--primary); border-radius: 15px; }

        #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body class="tv-mode">

<div id="winner-overlay" class="hidden">
    <div style="font-size: 150px;">🏆</div>
    <div id="champion-display" style="font-size: 80px; font-weight: bold; color: var(--primary);">WINNER</div>
    <button style="width: 400px; background: var(--accent); color: #000; margin-top: 40px;" onclick="location.reload()">NEW TOURNAMENT</button>
</div>

<div class="header">
    <div style="font-weight: 900; letter-spacing: 2px;">🎱 BRACKET MAKER TV</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <button id="undo-chip-btn" class="hidden" style="width: auto; background: var(--accent); color: #000;" onclick="undoChipAction()">⏪ UNDO</button>
        <button style="width: auto; background: #444;" onclick="toggleDisplayMode()">🖥️ TV/MOBILE</button>
        <button style="width: auto; background: #ff4444;" onclick="location.reload()">RESET</button>
    </div>
</div>

<div class="container">
    <div id="setup-view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Setup</h2>
            <div class="counter-box">Players: <span id="player-count">0</span></div>
        </div>

        <select id="tourney-type" onchange="toggleSetupMode()">
            <option value="single">Single Elimination</option>
            <option value="double" selected>Double Elimination</option>
            <option value="chip">Chip Tournament (Queue)</option>
        </select>

        <div id="bulk-names" style="margin-top: 25px;">
            <label style="display:block; margin-bottom:10px;">Enter Names (One per line):</label>
            <textarea id="name-list" rows="10" placeholder="Player 1&#10;Player 2&#10;Player 3" oninput="updateCount()"></textarea>
            <button style="margin-top: 20px; background: var(--accent); color: #000;" onclick="randomizeNames()">🎲 RANDOM DRAW / SHUFFLE</button>
        </div>

        <div id="individual-names" class="hidden" style="margin-top: 25px;">
            <div id="player-rows-container"></div>
        </div>

        <button style="margin-top: 40px; background: var(--primary); height: 110px; font-weight: bold; font-size: 1.2em;" onclick="startTourney()">START TOURNAMENT</button>
    </div>

    <div id="bracket-view" class="hidden">
        <div id="bracket-render" class="bracket-scroll"></div>
        <div id="losers-section" class="hidden">
            <h2 style="color:var(--accent); margin-top: 40px; border-top: 2px solid #333; padding-top: 20px;">Losers Bracket</h2>
            <div id="losers-render" class="bracket-scroll"></div>
        </div>
    </div>

    <div id="chip-view" class="hidden">
        <div class="chip-grid" id="chip-tables-container"></div>
        <div id="chip-queue-render" style="margin-top: 30px; background: #111; padding: 25px; border-radius: 15px; border: 2px dashed #444;"></div>
    </div>
</div>

<script>
    let players = []; let queue = []; let activeMatches = [[], [], [], [], []];
    let mode = 'single'; let gfReset = false; let chipHistory = [];

    function toggleDisplayMode() { document.body.classList.toggle('tv-mode'); document.body.classList.toggle('mobile-mode'); }
    
    function updateCount() {
        const count = document.getElementById('name-list').value.split('\n').filter(n => n.trim()).length;
        document.getElementById('player-count').innerText = count;
    }

    function toggleSetupMode() {
        const type = document.getElementById('tourney-type').value;
        document.getElementById('bulk-names').classList.toggle('hidden', type === 'chip');
        document.getElementById('individual-names').classList.toggle('hidden', type !== 'chip');
        if(type === 'chip') {
            const container = document.getElementById('player-rows-container');
            container.innerHTML = '';
            for(let i=0; i<8; i++) {
                container.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px"><input type="text" placeholder="Player ${i+1}" class="p-name"><input type="number" value="3" style="width:100px" class="p-chips"></div>`;
            }
        }
    }

    function startTourney() {
        mode = document.getElementById('tourney-type').value;
        players = [];
        if(mode === 'chip') {
            document.querySelectorAll('#player-rows-container > div').forEach(div => {
                const name = div.querySelector('.p-name').value.trim();
                const chips = parseInt(div.querySelector('.p-chips').value);
                if(name) players.push({ name, chips, id: Math.random() });
            });
            queue = [...players];
            document.getElementById('undo-chip-btn').classList.remove('hidden');
            refreshChipUI();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('chip-view').classList.remove('hidden');
        } else {
            document.getElementById('name-list').value.split('\n').filter(n => n.trim()).forEach(n => {
                players.push({ name: n.trim(), id: Math.random() });
            });
            setupBrackets();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('bracket-view').classList.remove('hidden');
        }
        setTimeout(() => document.querySelector('button:not(.hidden)')?.focus(), 100);
    }

    function setupBrackets() {
        const rounds = Math.ceil(Math.log2(players.length));
        renderBracket('bracket-render', 'W', rounds);
        if(mode === 'double') {
            document.getElementById('losers-section').classList.remove('hidden');
            renderBracket('losers-render', 'L', rounds);
            const gf = document.createElement('div'); gf.className = 'round';
            gf.innerHTML = `<div class="match" id="GF-match">
                <div id="gf-status" class="reset-badge">GRAND FINAL</div>
                <button class="player-btn" onclick="advBr('GF',0,0,0)">Winner Champ</button>
                <button class="player-btn" onclick="advBr('GF',0,0,1)">Loser Champ</button>
            </div>`;
            document.getElementById('bracket-render').appendChild(gf);
        }
        const slots = document.querySelectorAll('#bracket-render .round:first-child .player-btn');
        players.forEach((p, i) => { if(slots[i]) { slots[i].dataset.name = p.name; slots[i].innerText = p.name; } });
    }

    function renderBracket(id, prefix, rounds) {
        const cont = document.getElementById(id);
        cont.innerHTML = '';
        for(let r=0; r<rounds; r++) {
            const rd = document.createElement('div'); rd.className = 'round';
            let mCount = Math.pow(2, rounds - r - 1);
            for(let m=0; m<mCount; m++) {
                rd.innerHTML += `<div class="match" id="${prefix}-r${r}-m${m}">
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},0)">TBD</button>
                    <button class="player-btn" onclick="advBr('${prefix}',${r},${m},1)">TBD</button>
                </div>`;
            }
            cont.appendChild(rd);
        }
    }

    function advBr(br, r, m, sIdx) {
        const matchEl = br === 'GF' ? document.getElementById('GF-match') : document.getElementById(`${br}-r${r}-m${m}`);
        const pEls = matchEl.querySelectorAll('.player-btn');
        const win = pEls[sIdx]; const lose = pEls[sIdx === 0 ? 1 : 0];
        if(win.innerText === 'TBD') return;

        if(br === 'GF' && sIdx === 1 && !gfReset) {
            gfReset = true;
            document.getElementById('gf-status').innerText = "MATCH 2 (RESET)";
            pEls.forEach(p => p.classList.remove('winner-highlight'));
            return;
        }

        win.classList.add('winner-highlight');
        lose.style.opacity = "0.2";

        if(mode === 'double' && br === 'W') {
            const lSlots = document.querySelectorAll('#losers-render .round:first-child .player-btn');
            for(let s of lSlots) { if(s.innerText === 'TBD') { s.dataset.name = lose.dataset.name; s.innerText = lose.innerText; break; } }
        }

        const nr = document.getElementById(`${br}-r${r+1}-m${Math.floor(m/2)}`);
        if(nr) {
            const target = nr.querySelectorAll('.player-btn')[m%2];
            target.dataset.name = win.dataset.name; target.innerText = win.innerText;
        } else if(br === 'W' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[0];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(br === 'L' && mode === 'double') {
            const gfP = document.querySelectorAll('#GF-match .player-btn')[1];
            gfP.innerText = win.innerText; gfP.dataset.name = win.dataset.name;
        } else if(mode === 'single' || br === 'GF') showChamp(win.dataset.name);
    }

    function refreshChipUI() {
        const grid = document.getElementById('chip-tables-container');
        for(let i=0; i<4; i++) { while(activeMatches[i].length < 2 && queue.length > 0) activeMatches[i].push(queue.shift()); }
        grid.innerHTML = activeMatches.map((m, idx) => `
            <div class="table-card">
                <div style="text-align:center; font-weight:bold; margin-bottom:10px">Table ${idx+1}</div>
                ${m.length === 2 ? `
                <button class="player-btn" onclick="chipWinner(${idx},0)">${m[0].name} [${m[0].chips}]</button>
                <button class="player-btn" onclick="chipWinner(${idx},1)">${m[1].name} [${m[1].chips}]</button>` : '<div style="text-align:center">Waiting...</div>'}
            </div>`).join('');
        document.getElementById('chip-queue-render').innerHTML = "<b>Next in Queue:</b> " + (queue.length ? queue.map(p => p.name).join(', ') : 'None');
    }

    function chipWinner(tIdx, wIdx) {
        chipHistory.push(JSON.parse(JSON.stringify({ queue, activeMatches })));
        const m = activeMatches[tIdx]; const w = m[wIdx]; const l = m[wIdx===0?1:0];
        l.chips--; if(l.chips > 0) queue.push(l);
        activeMatches[tIdx] = [w];
        refreshChipUI();
    }

    function undoChipAction() {
        if(!chipHistory.length) return;
        const last = chipHistory.pop();
        queue = last.queue; activeMatches = last.activeMatches;
        refreshChipUI();
    }

    function showChamp(n) { document.getElementById('champion-display').innerText = n; document.getElementById('winner-overlay').classList.remove('hidden'); document.querySelector('#winner-overlay button').focus(); }
    function randomizeNames() { let l = document.getElementById('name-list').value.split('\n').filter(n => n.trim()); l.sort(() => Math.random() - 0.5); document.getElementById('name-list').value = l.join('\n'); updateCount(); }

    // D-PAD NAVIGATION ENGINE
    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        
        // ALLOW ENTER KEY IN TEXTAREA
        if (active.tagName === 'TEXTAREA' && e.keyCode === 13) {
            return; // Don't prevent default, allow new line
        }

        const focusables = Array.from(document.querySelectorAll('button, input, textarea, select')).filter(el => el.offsetParent !== null);
        let index = focusables.indexOf(active);

        if (e.keyCode === 37 || e.keyCode === 38) { // Up/Left
            e.preventDefault();
            const next = index > 0 ? index - 1 : focusables.length - 1;
            focusables[next].focus();
        } else if (e.keyCode === 39 || e.keyCode === 40) { // Down/Right
            e.preventDefault();
            const next = index < focusables.length - 1 ? index + 1 : 0;
            focusables[next].focus();
        }
    });

    window.onload = () => document.querySelector('select').focus();
</script>
</body>
</html>
