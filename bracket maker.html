<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Maker TV</title>
    <style>
        :root { --primary: #00cc66; --bg: #0a0a0a; --surface: #1a1a1a; --text: #fff; --accent: #ffcc00; --border-thick: 6px; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .tv-mode { font-size: 32px; }
        .container { padding: 20px; max-width: 1400px; margin: auto; }
        
        /* THE CRITICAL PIECE: FORCING THE BORDER VISIBILITY */
        .focusable, .player, .chip-card, button, input, select, textarea { 
            border: var(--border-thick) solid #444 !important; 
            box-sizing: border-box;
            cursor: pointer;
            outline: none; /* Hide default browser outline to use our own */
        }

        /* HIGH-CONTRAST FOCUS STATE FOR TV BRIGHTNESS */
        :focus { 
            outline: 12px solid var(--accent) !important; 
            border-color: var(--accent) !important;
            background: var(--primary) !important; 
            color: #000 !important; 
            transform: scale(1.08);
            z-index: 999;
        }

        .header { display: flex; justify-content: space-between; padding: 20px; background: var(--surface); border-bottom: 8px solid var(--primary); align-items: center; }
        .setup-box { background: var(--surface); padding: 25px; border-radius: 15px; border: var(--border-thick) solid var(--primary); }
        .bracket-scroll { display: flex; overflow-x: auto; gap: 50px; padding: 40px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 300px; }
        .match { background: #262626; margin: 20px 0; border-radius: 10px; border-left: 15px solid var(--accent); border-top: 2px solid #444; border-right: 2px solid #444; border-bottom: 2px solid #444; }
        .player { padding: 20px; display: flex; justify-content: space-between; background: #1a1a1a; }
        .winner-highlight { background: var(--primary) !important; color: #000 !important; font-weight: 900; }
        
        .chip-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .match-area { background: #222; padding: 20px; border-radius: 12px; border: var(--border-thick) solid var(--primary); text-align: center; }
        
        input, textarea, select { background: #2a2a2a; color: white; padding: 15px; border-radius: 10px; font-size: 1em; width: 100%; }
        .btn { padding: 20px; font-weight: bold; border-radius: 10px; text-transform: uppercase; background: #444; color: white; }
        .hidden { display: none !important; }
        #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .reset-badge { font-size: 0.6em; background: #ff4444; color: white; padding: 5px 15px; border-radius: 10px; border: 3px solid #fff; }
    </style>
</head>
<body class="tv-mode">

<div id="winner-overlay" class="hidden">
    <div style="font-size: 200px;">🏆</div>
    <div id="champion-display" style="font-size: 100px; font-weight: bold; color: var(--primary);">WINNER</div>
    <button class="btn focusable" tabindex="0" style="margin-top: 50px; background: var(--accent); color: black;" onclick="location.reload()">NEW TOURNAMENT</button>
</div>

<div class="header">
    <div style="font-weight: 900; letter-spacing: 3px;">🎱 BRACKET MAKER TV</div>
    <div style="display: flex; gap: 15px;">
        <button id="undo-chip-btn" class="btn focusable hidden" tabindex="0" onclick="undoChipAction()" style="background: var(--accent); color: black;">⏪ UNDO</button>
        <button class="btn focusable" tabindex="0" onclick="location.reload()" style="background:#ff4444">RESET</button>
    </div>
</div>

<div class="container">
    <div id="setup-view" class="setup-box">
        <select id="tourney-type" class="focusable" tabindex="0" style="height: 100px; margin-bottom: 30px;" onchange="toggleSetupMode()">
            <option value="single">Single Elimination</option>
            <option value="double">Double Elimination</option>
            <option value="round">Round Robin (League)</option>
            <option value="chip">Chip Tournament (Queue Mode)</option>
        </select>

        <div id="bulk-names">
            <textarea id="name-list" class="focusable" tabindex="0" rows="6" placeholder="Enter Names (One per line)" oninput="updateCount()"></textarea>
            <button class="btn focusable" tabindex="0" style="background: var(--accent); color:black; width: 100%; margin-top: 20px;" onclick="randomizeNames()">🎲 RANDOM DRAW</button>
        </div>

        <div id="individual-names" class="hidden">
            <div id="player-rows-container"></div>
            <button id="add-btn" class="btn focusable hidden" tabindex="0" onclick="addPlayerRow()" style="width:100%; margin-top:20px;">+ Add Player</button>
        </div>
        <button class="btn focusable" tabindex="0" style="background: var(--primary); width: 100%; margin-top: 40px; height: 120px; font-size: 1.5em;" onclick="startTourney()">START TOURNAMENT</button>
    </div>

    <div id="bracket-view" class="hidden">
        <div id="bracket-render" class="bracket-scroll"></div>
        <div id="losers-section" class="hidden">
            <h2 style="color:var(--accent); margin-left: 40px;">Losers Bracket</h2>
            <div id="losers-render" class="bracket-scroll"></div>
        </div>
    </div>

    <div id="chip-view" class="hidden">
        <div class="chip-layout">
            <div id="chip-tables-container" class="tables-grid"></div>
            <div id="chip-queue-render" style="background: var(--surface); padding: 20px; border-radius: 15px; border: var(--border-thick) solid #444;"></div>
        </div>
    </div>
</div>

<script>
    let players = []; let queue = []; let activeMatches = [[], [], [], [], []];
    let mode = 'single'; let grandFinalsReset = false; let chipHistory = [];

    function updateCount() {
        const type = document.getElementById('tourney-type').value;
        let count = type === 'chip' ? document.querySelectorAll('.player-row').length : document.getElementById('name-list').value.split('\n').filter(n => n.trim()).length;
    }

    function toggleSetupMode() {
        const type = document.getElementById('tourney-type').value;
        document.getElementById('bulk-names').classList.toggle('hidden', type === 'chip');
        document.getElementById('individual-names').classList.toggle('hidden', type !== 'chip');
        if(type === 'chip' && !document.getElementById('player-rows-container').children.length) {
            for(let i=0; i<8; i++) addPlayerRow();
        }
    }

    function addPlayerRow() {
        const div = document.createElement('div'); div.className = 'player-row'; div.style.display = "flex"; div.style.gap = "10px"; div.style.marginBottom = "10px";
        div.innerHTML = `<input type="text" class="focusable" tabindex="0" placeholder="Name" style="flex:2"> 
                         <input type="number" class="focusable" tabindex="0" value="3" style="width:120px">`;
        document.getElementById('player-rows-container').appendChild(div);
    }

    function startTourney() {
        mode = document.getElementById('tourney-type').value;
        players = [];
        if(mode === 'chip') {
            document.querySelectorAll('.player-row').forEach(r => {
                const i = r.querySelectorAll('input');
                if(i[0].value.trim()) players.push({ name: i[0].value.trim(), chips: parseInt(i[1].value), streak: 0, id: Math.random() });
            });
            queue = [...players]; document.getElementById('chip-view').classList.remove('hidden'); 
            document.getElementById('undo-chip-btn').classList.remove('hidden');
            refreshChipUI();
        } else {
            document.getElementById('name-list').value.split('\n').filter(n => n.trim()).forEach(n => {
                players.push({ name: n.trim(), id: Math.random() });
            });
            document.getElementById('bracket-view').classList.remove('hidden'); setupBrackets();
        }
        document.getElementById('setup-view').classList.add('hidden');
        setTimeout(initNavigation, 500); // Re-scan for Tizen
    }

    function setupBrackets() {
        const rounds = Math.ceil(Math.log2(players.length));
        renderBracket('bracket-render', 'W', rounds);
        if(mode === 'double') { 
            document.getElementById('losers-section').classList.remove('hidden'); 
            renderBracket('losers-render', 'L', rounds); 
            const gf = document.createElement('div'); gf.className = 'round';
            gf.innerHTML = `<div class="match" id="GF-match">
                    <div id="gf-status" class="reset-badge">GRAND FINAL</div>
                    <div class="player focusable" tabindex="0" onclick="advBr('GF',0,0,0)">Winner Champ</div>
                    <div class="player focusable" tabindex="0" onclick="advBr('GF',0,0,1)">Loser Champ</div>
                </div>`;
            document.getElementById('bracket-render').appendChild(gf);
        }
        const slots = document.querySelectorAll('#bracket-render .round:first-child .player');
        players.forEach((p, i) => { if(slots[i]) { slots[i].dataset.name = p.name; slots[i].innerText = p.name; } });
    }

    function renderBracket(id, prefix, rounds) {
        const cont = document.getElementById(id); cont.innerHTML = "";
        for(let r=0; r<rounds; r++) {
            const rd = document.createElement('div'); rd.className = 'round';
            let mCount = Math.pow(2, rounds - r - 1);
            for(let m=0; m<mCount; m++) {
                rd.innerHTML += `<div class="match" id="${prefix}-r${r}-m${m}">
                    <div class="player focusable" tabindex="0" onclick="advBr('${prefix}',${r},${m},0)">TBD</div>
                    <div class="player focusable" tabindex="0" onclick="advBr('${prefix}',${r},${m},1)">TBD</div></div>`;
            }
            cont.appendChild(rd);
        }
    }

    function advBr(br, r, m, sIdx) {
        const matchEl = br === 'GF' ? document.getElementById('GF-match') : document.getElementById(`${br}-r${r}-m${m}`);
        const pEls = matchEl.querySelectorAll('.player');
        const win = pEls[sIdx]; const lose = pEls[sIdx === 0 ? 1 : 0];
        if(win.innerText === 'TBD') return;

        if(br === 'GF' && sIdx === 1 && !grandFinalsReset) {
            grandFinalsReset = true;
            document.getElementById('gf-status').innerText = "MATCH 2 (RESET)";
            pEls.forEach(p => { p.classList.remove('winner-highlight'); p.style.opacity = "1"; });
            return;
        }

        win.classList.add('winner-highlight'); lose.style.opacity = "0.3";
        if (mode === 'double' && br === 'W') {
            const lSlots = document.querySelectorAll('#losers-render .round:first-child .player');
            for(let s of lSlots) { if(s.innerText === 'TBD') { s.dataset.name = lose.dataset.name; s.innerText = lose.innerText; break; } }
        }
        
        const nr = document.getElementById(`${br}-r${r+1}-m${Math.floor(m/2)}`);
        if(nr) { 
            const t = nr.querySelectorAll('.player')[m%2]; 
            t.dataset.name = win.dataset.name; t.innerText = win.innerText; 
        } else if (br === 'W' && mode === 'double') { 
            const p = document.querySelectorAll('#GF-match .player')[0]; p.innerText = win.innerText; p.dataset.name = win.dataset.name; 
        } else if (br === 'L' && mode === 'double') { 
            const p = document.querySelectorAll('#GF-match .player')[1]; p.innerText = win.innerText; p.dataset.name = win.dataset.name; 
        } else if (mode === 'single' || br === 'GF') showChamp(win.dataset.name);
    }

    function refreshChipUI() {
        const grid = document.getElementById('chip-tables-container');
        for(let i=0; i<5; i++) { while(activeMatches[i].length < 2 && queue.length > 0) activeMatches[i].push(queue.shift()); }
        grid.innerHTML = activeMatches.map((m, idx) => `
            <div class="match-area">Table ${idx+1}
                ${m.length === 2 ? `
                <div class="chip-card focusable" tabindex="0" onclick="chipWinner(${idx},0)"><span>${m[0].name}</span> <span style="color:var(--accent)">[${m[0].chips}]</span></div>
                <div class="chip-card focusable" tabindex="0" onclick="chipWinner(${idx},1)"><span>${m[1].name}</span> <span style="color:var(--accent)">[${m[1].chips}]</span></div>` : '<div>Waiting...</div>'}
            </div>`).join('');
        document.getElementById('chip-queue-render').innerHTML = `<h3>Queue</h3>` + queue.map(p => `<div>${p.name} (${p.chips} chips)</div>`).join('');
        initNavigation();
    }

    function chipWinner(tIdx, wIdx) {
        const m = activeMatches[tIdx]; const w = m[wIdx]; const l = m[wIdx===0?1:0];
        l.chips--; if(l.chips > 0) queue.push(l);
        w.streak++; if(w.streak >= 3) { w.streak = 0; queue.push(w); activeMatches[tIdx] = []; } else activeMatches[tIdx] = [w];
        refreshChipUI();
    }

    function showChamp(n) { document.getElementById('champion-display').innerText = n; document.getElementById('winner-overlay').classList.remove('hidden'); }
    function randomizeNames() { let l = document.getElementById('name-list').value.split('\n').filter(n => n.trim()); l.sort(() => Math.random() - 0.5); document.getElementById('name-list').value = l.join('\n'); }

    /* ULTRA-ROBUST TV ENGINE */
    function initNavigation() {
        const elements = document.querySelectorAll('button, input, select, textarea, .player, .chip-card, [tabindex="0"]');
        elements.forEach(el => {
            el.classList.add('focusable');
            if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex', '0');
        });
    }

    window.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        const focusables = Array.from(document.querySelectorAll('.focusable')).filter(el => el.offsetParent !== null);
        let index = focusables.indexOf(active);

        if (index === -1) { focusables[0]?.focus(); return; }

        // Enter Key
        if (e.keyCode === 13) {
            if (active.tagName === 'TEXTAREA') return;
            active.click();
            return;
        }

        // Arrow Key Navigation
        let next;
        if (e.keyCode === 39 || e.keyCode === 40) next = focusables[index + 1]; // Right or Down
        if (e.keyCode === 37 || e.keyCode === 38) next = focusables[index - 1]; // Left or Up

        if (next) {
            e.preventDefault();
            next.focus();
            next.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });

    window.onload = () => { initNavigation(); document.querySelector('.focusable')?.focus(); };
</script>
</body>
</html>
