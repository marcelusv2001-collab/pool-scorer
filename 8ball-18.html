<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lebanon 8-Ball Pro</title>
    <style>
        :root {
            --bg: #020617; --felt: #000080; --gold: #fbbf24;
            --wood: #451a03; --slate: #1e293b; --text: #f8fafc;
            --home: #3b82f6; --visit: #ef4444;
            --status-off: #475569; --status-on: #22c55e; --status-err: #ef4444;
            --dropdown-bg: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; height: 100vh; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            background: linear-gradient(to bottom, var(--wood), #000080);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); flex-shrink: 0;
        }
        header h1 { font-size: 0.9rem; margin: 0; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        
        .header-btns { display: flex; gap: 15px; align-items: center; }
        .reset-btn, .help-trigger { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 0; margin: 0; }
        .help-trigger { font-size: 1.4rem; color: var(--gold); }
        .stats-link-btn { background: var(--gold); color: black; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-decoration: none; display: none; }

        #help-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; padding: 20px; overflow-y: auto;
        }
        .help-content {
            background: var(--slate); border: 2px solid var(--gold);
            border-radius: 12px; padding: 20px; max-width: 500px; margin: 0 auto;
        }
        .help-content h2 { color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        .help-content h3 { color: var(--gold); font-size: 0.9rem; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .help-content p, .help-content li { font-size: 0.85rem; line-height: 1.4; color: #cbd5e1; }
        .help-close {
            background: var(--gold); color: black; border: none; width: 100%;
            padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }

        details { background: #1e293b; border-bottom: 1px solid var(--gold); z-index: 100; }
        summary { color: var(--gold); font-size: 0.75rem; cursor: pointer; padding: 10px; font-weight: bold; list-style: none; text-align: center; }
        .settings-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .status-container {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155;
        }
        .led-light {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--status-off); box-shadow: 0 0 2px black;
        }
        .led-light.active { 
            background: var(--status-on); 
            box-shadow: 0 0 10px var(--status-on);
            animation: blink 2s infinite;
        }
        .led-light.error { background: var(--status-err); box-shadow: 0 0 10px var(--status-err); }
        #status-text { font-size: 0.7rem; font-weight: bold; color: #94a3b8; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .settings-content input, .settings-content select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--gold); background: #020617; color: white; font-size: 0.8rem; }
        .settings-btns { display: flex; gap: 8px; }
        .btn-load { flex: 1; background: var(--gold); border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-clear { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn-clear-match { background: #475569; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; width: 100%; margin-top: 5px; }

        #scoring-interface { flex: 1; overflow-y: auto; padding: 6px; background: var(--bg); position: relative; }
        .team-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; background: var(--slate); border-radius: 8px; padding-right: 4px; border: 1px solid #334155; }
        .input-wrapper input { width: 100%; background: transparent; border: none; color: white; padding: 12px; font-size: 0.9rem; outline: none; font-weight: bold; cursor: pointer; }
        
        .game-grid { background: var(--felt); border-radius: 12px; border: 3px solid var(--wood); display: flex; flex-direction: column; }
        .game-row { display: grid; grid-template-columns: 28px 1fr 1fr 42px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 4px; }
        .game-num { font-size: 0.75rem; font-weight: bold; color: var(--gold); text-align: center; opacity: 0.8; }
        
        .player-box { position: relative; display: flex; flex-direction: column; padding: 4px; border: 2px solid transparent; transition: border 0.2s ease; border-radius: 8px; }
        
        /* Home Winner: White Border */
        .player-box.win-home { border-color: white; background: rgba(255, 255, 255, 0.05); }
        
        /* Visiting Winner: Red Border */
        .player-box.win-visit { border-color: var(--visit); background: rgba(239, 68, 68, 0.1); }
        
        .p-input-wrap { display: flex; align-items: center; background: rgba(0,0,0,0.4); border-radius: 6px; padding-right: 2px; }
        .p-input-wrap input { background: transparent; border: none; color: white; padding: 8px; font-size: 0.85rem; width: 100%; outline: none; cursor: pointer; }
        
        .custom-dropdown {
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: var(--dropdown-bg); border: 1px solid var(--gold); 
            border-radius: 6px; z-index: 1000; max-height: 200px; 
            overflow-y: auto; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-item {
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem; color: white; cursor: pointer;
        }
        .dropdown-item:active { background: var(--gold); color: black; }
        .dropdown-item.add-new { color: var(--gold); font-weight: bold; text-align: center; background: rgba(0,0,0,0.2); }

        .voice-btn { background: none; border: none; color: var(--gold); cursor: pointer; padding: 4px; font-size: 1.1rem; }
        .voice-btn.listening { color: var(--visit); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .markers { display: flex; gap: 6px; margin-top: 5px; }
        .marker { font-size: 0.65rem; padding: 2px 6px; background: rgba(0,0,0,0.6); border-radius: 4px; color: #94a3b8; cursor: pointer; border: 1px solid transparent; }
        .marker.on { background: var(--gold); color: black; font-weight: bold; border-color: white; }

        .win-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 900; background: #0f172a; color: #475569; justify-self: center; }
        .win-btn.h { background: var(--home); color: white; border-color: white; box-shadow: 0 0 10px var(--home); }
        .win-btn.v { background: var(--visit); color: white; border-color: white; box-shadow: 0 0 10px var(--visit); }

        footer { background: #0f172a; padding: 16px; display: grid; grid-template-columns: 1fr 2.5fr 1fr; align-items: center; gap: 8px; flex-shrink: 0; border-top: 1px solid #1e293b; }
        .score-chip { text-align: center; }
        .score-chip span { font-size: 1.6rem; font-weight: 900; color: var(--gold); }
        .actions { display: flex; flex-direction: column; gap: 6px; }
        .btn-submit { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-copy { background: #334155; color: white; border: none; padding: 6px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body onclick="closeAllDropdowns(event)">

<div id="help-modal">
    <div class="help-content">
        <h2>How to use Lebanon 8-Ball</h2>
        <p>1. <b>SETUP:</b> Connect your roster data.</p>
        <p>2. <b>SCORING:</b> Tap 'W' to cycle wins. Home = <b>White Border</b>, Visit = <b>Red Border</b>.</p>
        <p>3. <b>DATA:</b> Manual player entries are saved instantly.</p>
        <button class="help-close" onclick="toggleHelp()">GOT IT!</button>
    </div>
</div>

<header>
    <div class="header-btns">
        <button class="reset-btn" onclick="resetBoard()">🗑️</button>
        <a id="view-stats" href="#" target="_blank" class="stats-link-btn">📊 STATS</a>
    </div>
    <h1>8-Ball 18 Games</h1>
    <button class="help-trigger" onclick="toggleHelp()">❓</button>
</header>

<details id="setup-panel">
    <summary>⚙️ SETUP: CONFIG & STATS</summary>
    <div class="settings-content">
        <div class="status-container">
            <div id="led" class="led-light"></div>
            <span id="status-text">ROSTER: DISCONNECTED</span>
        </div>
        <input type="text" id="sheet-url" placeholder="Paste Google CSV URL here...">
        <select id="week-selector" onchange="updateMatchupList()"></select>
        <select id="match-selector" style="display:none;" onchange="loadSelectedMatch()"></select>
        <button id="clear-match-btn" class="btn-clear-match" style="display:none;" onclick="clearSelectedMatch()">❌ CLEAR MATCH SELECTION</button>
        <input type="text" id="stats-url" placeholder="Paste League Stats URL here...">
        <div class="settings-btns">
            <button class="btn-load" onclick="saveSettings()">SAVE ALL</button>
            <button class="btn-clear" onclick="clearSettings()">RESET</button>
        </div>
    </div>
</details>

<main id="scoring-interface">
    <div class="team-banner">
        <div class="input-wrapper">
            <input type="text" id="h-team" placeholder="Home Team" readonly onclick="showTeamDropdown(event, 'h-team')">
            <div id="h-team-menu" class="custom-dropdown"></div>
            <button class="voice-btn" onclick="startVoice('h-team')">🎤</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="v-team" placeholder="Visiting Team" readonly onclick="showTeamDropdown(event, 'v-team')">
            <div id="v-team-menu" class="custom-dropdown"></div>
            <button class="voice-btn" onclick="startVoice('v-team')">🎤</button>
        </div>
    </div>
    <div class="game-grid" id="grid"></div>
</main>

<footer>
    <div class="score-chip"><span><span id="h-score">0</span></span></div>
    <div class="actions">
        <button class="btn-submit" onclick="handleSubmit()">Submit & Text</button>
        <button class="btn-copy" onclick="copyResults()">📋 Copy Text</button>
    </div>
    <div class="score-chip"><span><span id="v-score">0</span></span></div>
</footer>

<script>
    let MASTER_ROSTERS = {};
    let MASTER_SCHEDULE = [];
    let state = Array.from({length: 18}, (_, i) => ({
        id: i + 1, h: "", v: "", hTR: false, h8B: false, vTR: false, v8B: false, win: null
    }));

    window.addEventListener('DOMContentLoaded', () => {
        const savedRosterUrl = localStorage.getItem('user_sheet_url');
        const savedStatsUrl = localStorage.getItem('user_stats_url');
        if (savedRosterUrl) fetchRosters(savedRosterUrl);
        if (savedStatsUrl) updateStatsButton(savedStatsUrl);
        draw();
    });

    function toggleHelp() {
        const modal = document.getElementById('help-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    async function saveSettings() {
        const rUrl = document.getElementById('sheet-url').value.trim();
        const sUrl = document.getElementById('stats-url').value.trim();
        if (rUrl) { localStorage.setItem('user_sheet_url', rUrl); await fetchRosters(rUrl); }
        if (sUrl) { localStorage.setItem('user_stats_url', sUrl); updateStatsButton(sUrl); }
        document.getElementById('setup-panel').open = false;
    }

    function setStatus(type) {
        const led = document.getElementById('led');
        const txt = document.getElementById('status-text');
        led.className = 'led-light'; 
        if(type === 'success') { led.classList.add('active'); txt.innerText = "DATA: ACTIVE"; txt.style.color = "var(--status-on)"; }
        else { led.classList.add('error'); txt.innerText = "DATA: ERROR"; txt.style.color = "var(--status-err)"; }
    }

    async function fetchRosters(url) {
        try {
            let fetchUrl = url.includes('/edit') ? url.replace(/\/edit.*$/, '/export?format=csv') : url;
            const response = await fetch(fetchUrl + (fetchUrl.includes('?') ? '&' : '?') + 'cb=' + new Date().getTime());
            const data = await response.text();
            parseCSV(data);
        } catch (err) { setStatus('error'); }
    }

    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const newRosters = {};
        const newSchedule = [];
        const today = new Date().toISOString().split('T')[0];
        lines.forEach((line, index) => {
            if (index === 0 || !line.trim()) return; 
            const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
            const rowType = parts[0]?.toUpperCase();
            if (rowType === "ROSTER") {
                const team = parts[1].toUpperCase();
                if (!newRosters[team]) newRosters[team] = [];
                newRosters[team].push(parts[2]);
            } else if (rowType === "SCHEDULE") {
                newSchedule.push({ home: parts[1], visit: parts[2], date: parts[3] });
            }
        });
        MASTER_ROSTERS = newRosters;
        MASTER_SCHEDULE = newSchedule;
        populateDateSelector(today);
        setStatus(Object.keys(MASTER_ROSTERS).length > 0 ? 'success' : 'error');
    }

    function populateDateSelector(today) {
        const selector = document.getElementById('week-selector');
        const dates = [...new Set(MASTER_SCHEDULE.map(s => s.date))].sort();
        selector.innerHTML = '<option value="">-- Choose a Date --</option>';
        dates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d;
            opt.innerText = d + (d === today ? ' (TODAY)' : '');
            selector.appendChild(opt);
        });
        if (dates.includes(today)) { selector.value = today; updateMatchupList(); }
    }

    function updateMatchupList() {
        const date = document.getElementById('week-selector').value;
        const ms = document.getElementById('match-selector');
        const cb = document.getElementById('clear-match-btn');
        if (!date) { ms.style.display = cb.style.display = 'none'; return; }
        const matches = MASTER_SCHEDULE.filter(s => s.date === date);
        ms.innerHTML = '<option value="">-- Select Your Game --</option>';
        matches.forEach((m, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.innerText = `${m.home} vs ${m.visit}`;
            ms.appendChild(opt);
        });
        ms.style.display = cb.style.display = 'block';
    }

    function loadSelectedMatch() {
        const date = document.getElementById('week-selector').value;
        const matchIdx = document.getElementById('match-selector').value;
        if (date === "" || matchIdx === "") return;
        const selected = MASTER_SCHEDULE.filter(s => s.date === date)[matchIdx];
        if (selected) {
            document.getElementById('h-team').value = selected.home;
            document.getElementById('v-team').value = selected.visit;
            draw();
        }
    }

    function clearSelectedMatch() {
        document.getElementById('week-selector').value = "";
        document.getElementById('match-selector').value = "";
        document.getElementById('h-team').value = "";
        document.getElementById('v-team').value = "";
        updateMatchupList();
        draw();
    }

    function showTeamDropdown(e, id) {
        e.stopPropagation();
        closeAllDropdowns();
        const menu = document.getElementById(id + '-menu');
        const teams = Object.keys(MASTER_ROSTERS);
        let html = `<div class="dropdown-item add-new" onclick="manualInput('${id}')">➕ TYPE TEAM MANUALLY</div>`;
        teams.forEach(t => html += `<div class="dropdown-item" onclick="selectValue('${id}', '${t}')">${t}</div>`);
        menu.innerHTML = html;
        menu.style.display = 'block';
    }

    function showPlayerDropdown(e, side, gameIdx) {
        e.stopPropagation();
        closeAllDropdowns();
        const id = side + '-in-' + (gameIdx + 1);
        const menu = document.getElementById(side + '-menu-' + gameIdx);
        const teamName = document.getElementById(side + '-team').value.toUpperCase();
        const players = MASTER_ROSTERS[teamName] || [];
        let html = `<div class="dropdown-item add-new" onclick="manualInput('${id}', ${gameIdx}, '${side}')">➕ ADD NEW PLAYER</div>`;
        players.forEach(p => html += `<div class="dropdown-item" onclick="selectPlayer('${side}', ${gameIdx}, '${p}')">${p}</div>`);
        menu.innerHTML = html;
        menu.style.display = 'block';
    }

    function manualInput(id, idx = null, side = null) {
        const input = document.getElementById(id);
        input.readOnly = false;
        input.value = "";
        input.focus();
        input.oninput = (e) => { if(idx !== null) state[idx][side] = e.target.value; };
        input.onblur = () => { input.readOnly = true; };
        closeAllDropdowns();
    }

    function selectValue(id, val) { document.getElementById(id).value = val; closeAllDropdowns(); }
    function selectPlayer(side, idx, val) { state[idx][side] = val; draw(); }
    function closeAllDropdowns() { document.querySelectorAll('.custom-dropdown').forEach(d => d.style.display = 'none'); }

    function draw() {
        const grid = document.getElementById('grid');
        grid.innerHTML = state.map((g, i) => `
            <div class="game-row">
                <div class="game-num">${g.id}</div>
                <div class="player-box ${g.win === 'h' ? 'win-home' : ''}">
                    <div class="p-input-wrap">
                        <input type="text" id="h-in-${g.id}" placeholder="Home" value="${g.h}" readonly onclick="showPlayerDropdown(event, 'h', ${i})">
                        <div id="h-menu-${i}" class="custom-dropdown"></div>
                        <button class="voice-btn" style="font-size:0.8rem" onclick="startVoice('h-in-${g.id}', ${i}, 'h')">🎤</button>
                    </div>
                    <div class="markers">
                        <span class="marker ${g.hTR?'on':''}" onclick="setExclusiveMarker(${g.id}, 'hTR')">TR</span>
                        <span class="marker ${g.h8B?'on':''}" onclick="setExclusiveMarker(${g.id}, 'h8B')">8B</span>
                    </div>
                </div>
                <div class="player-box ${g.win === 'v' ? 'win-visit' : ''}">
                    <div class="p-input-wrap">
                        <input type="text" id="v-in-${g.id}" placeholder="Visit" value="${g.v}" readonly onclick="showPlayerDropdown(event, 'v', ${i})">
                        <div id="v-menu-${i}" class="custom-dropdown"></div>
                        <button class="voice-btn" style="font-size:0.8rem" onclick="startVoice('v-in-${g.id}', ${i}, 'v')">🎤</button>
                    </div>
                    <div class="markers">
                        <span class="marker ${g.vTR?'on':''}" onclick="setExclusiveMarker(${g.id}, 'vTR')">TR</span>
                        <span class="marker ${g.v8B?'on':''}" onclick="setExclusiveMarker(${g.id}, 'v8B')">8B</span>
                    </div>
                </div>
                <div class="win-btn ${g.win||''}" onclick="cycleWin(${g.id})">${g.win ? g.win.toUpperCase() : 'W'}</div>
            </div>
        `).join('');
        document.getElementById('h-score').innerText = state.filter(g => g.win === 'h').length;
        document.getElementById('v-score').innerText = state.filter(g => g.win === 'v').length;
    }

    function setExclusiveMarker(gameId, clickedKey) {
        const g = state[gameId - 1];
        const active = g[clickedKey];
        g.hTR = g.h8B = g.vTR = g.v8B = false;
        if (!active) g[clickedKey] = true;
        draw();
    }

    function cycleWin(id) {
        const g = state[id-1];
        g.win = g.win === null ? 'h' : (g.win === 'h' ? 'v' : null);
        draw();
    }

    function resetBoard() {
        if(confirm("Reset entire score sheet?")) {
            state.forEach(g => { g.h=""; g.v=""; g.hTR=g.h8B=g.vTR=g.v8B=false; g.win=null; });
            document.getElementById('h-team').value = ""; document.getElementById('v-team').value = "";
            draw();
        }
    }

    function startVoice(targetId, idx = null, side = null) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        const recognition = new Speech();
        const btn = event.currentTarget;
        recognition.onstart = () => btn.classList.add('listening');
        recognition.onend = () => btn.classList.remove('listening');
        recognition.onresult = (e) => {
            const val = e.results[0][0].transcript;
            document.getElementById(targetId).value = val;
            if(idx !== null) state[idx][side] = val;
            draw();
        };
        recognition.start();
    }

    function buildMessage() {
        const hT = (document.getElementById('h-team').value || "Home").toUpperCase();
        const vT = (document.getElementById('v-team').value || "Visit").toUpperCase();
        let msg = `🎱 LEBANON 8-BALL\n🏠 ${hT} (${document.getElementById('h-score').innerText})\n🚗 ${vT} (${document.getElementById('v-score').innerText})\n\n`;
        state.forEach(g => {
            if (g.h || g.v || g.win) {
                const hM = (g.hTR ? '⭐' : '') + (g.h8B ? '🔥' : '');
                const vM = (g.vTR ? '⭐' : '') + (g.v8B ? '🔥' : '');
                msg += `Gm${g.id} ${g.h || "P"}${g.win === 'h' ? ' ✅' : ''}${hM} vs ${g.v || "P"}${g.win === 'v' ? ' ✅' : ''}${vM}\n`;
            }
        });
        return msg + `\nTr=⭐ 8bb=🔥`;
    }

    function handleSubmit() {
        const msg = buildMessage();
        if (navigator.share) navigator.share({ text: msg }).catch(() => {});
        else window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
    }

    function copyResults() { navigator.clipboard.writeText(buildMessage()).then(() => alert("Copied!")); }
    function updateStatsButton(url) { const btn = document.getElementById('view-stats'); if (url) { btn.href = url; btn.style.display = 'block'; } }
    function clearSettings() { if(confirm("Clear settings?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
