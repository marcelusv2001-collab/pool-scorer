<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shays Leaderboard - Game Record Scraper</title>
    <style>
        /* Transparent for OBS Overlay */
        body {
            margin: 0;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0); 
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
        }

        .flex-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .board {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 8px;
            padding: 15px;
            border-top: 4px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 { 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.2em; 
            text-transform: uppercase; 
            color: #00d4ff;
            letter-spacing: 1px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 1px solid #444; padding: 8px; text-align: left; font-size: 0.9em; color: #888; }
        td { padding: 8px; border-bottom: 1px solid #222; font-size: 1em; }

        .pts { text-align: right; font-weight: bold; color: #00d4ff; }
        .rank { width: 30px; font-weight: bold; color: #666; }

        /* Admin Controls - Hide using Alt+Drag in OBS */
        #admin {
            background: #222;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-shadow: none;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input { 
            padding: 8px; 
            flex-grow: 1; 
            border-radius: 4px; 
            border: 1px solid #444; 
            background: #111; 
            color: white; 
        }
        button { 
            padding: 8px 15px; 
            cursor: pointer; 
            background: #00d4ff; 
            border: none; 
            font-weight: bold; 
            border-radius: 4px; 
            color: #000;
        }
    </style>
</head>
<body>

    <div id="admin">
        <input type="text" id="urlInput" placeholder="Paste Digital Pool Stats URL...">
        <button onclick="startTracking()">Update Boards</button>
        <span id="status" style="margin-left:10px; font-size:0.8em; color: #888;">Waiting...</span>
    </div>

    <div class="flex-container">
        <div class="board">
            <h2>Player Wins (Game Record)</h2>
            <table>
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th>Player</th>
                        <th class="pts">Wins</th>
                    </tr>
                </thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>

        <div class="board">
            <h2>Team Totals</h2>
            <table>
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th>Team</th>
                        <th class="pts">Total Wins</th>
                    </tr>
                </thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let interval;

        async function updateData() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;

            document.getElementById('status').innerText = "Refreshing...";

            try {
                const proxy = "https://api.allorigins.win/get?url=";
                const response = await fetch(`${proxy}${encodeURIComponent(url)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Select rows from the stats table
                const rows = doc.querySelectorAll('table tbody tr');

                let players = [];
                let teams = {};

                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    
                    // We check cells.length to ensure it's a valid data row
                    if (cells.length >= 4) {
                        const name = cells[0].innerText.trim();
                        const teamName = cells[2].innerText.trim() || "Independent";
                        
                        // Extracting the first number from "Game Record" (e.g., "15 - 5")
                        const recordRaw = cells[3].innerText.trim();
                        const wins = parseInt(recordRaw.split('-')[0]) || 0;

                        if (name && name !== "Player") {
                            players.push({ name, points: wins });
                            teams[teamName] = (teams[teamName] || 0) + wins;
                        }
                    }
                });

                renderBoards(players, teams);
                document.getElementById('status').innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Scrape Error:", e);
                document.getElementById('status').innerText = "Error: Check URL/Table Format";
            }
        }

        function renderBoards(players, teams) {
            // Player Standings (Top 15)
            const pBody = document.getElementById('playerBody');
            const sortedPlayers = players.sort((a,b) => b.points - a.points).slice(0, 15);
            
            pBody.innerHTML = sortedPlayers.map((p, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${p.name}</td>
                    <td class="pts">${p.points}</td>
                </tr>
            `).join('');

            // Team Totals
            const tBody = document.getElementById('teamBody');
            const sortedTeams = Object.entries(teams).sort((a,b) => b[1] - a[1]);
            
            tBody.innerHTML = sortedTeams.map((t, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${t[0]}</td>
                    <td class="pts">${t[1]}</td>
                </tr>
            `).join('');
        }

        function startTracking() {
            updateData();
            if (interval) clearInterval(interval);
            // Refresh every 60 seconds
            interval = setInterval(updateData, 60000);
        }
    </script>
</body>
</html>
