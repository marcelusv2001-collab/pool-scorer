<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MVP TV - Tournament Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --gold: #ffd700; --bg: #0a0a0a; }
        
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            font-family: 'Roboto', sans-serif; color: #fff;
            display: flex; flex-direction: column;
        }

        /* 16:9 Ratio Container */
        .tv-canvas {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        header {
            height: 15%; display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; background: rgba(0,0,0,0.8);
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-img { height: 80px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }
        header h1 { font-family: 'Anton', sans-serif; font-size: 4rem; text-transform: uppercase; margin: 0; letter-spacing: 6px; color: #fff; }

        .main-stage {
            height: 75%; display: flex; gap: 40px; padding: 40px;
        }

        .board {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(15, 15, 15, 0.95); border: 2px solid #333;
            border-radius: 20px; overflow: hidden; position: relative;
        }

        .board-header {
            background: #111; padding: 20px; text-align: center;
            font-family: 'Anton'; font-size: 2.2rem; color: var(--primary);
            border-bottom: 3px solid #222; text-transform: uppercase;
        }

        .scroll-container { flex-grow: 1; overflow: hidden; position: relative; }
        .scroll-content { position: absolute; width: 100%; top: 0; left: 0; padding: 10px 30px; transition: transform 0.1s linear; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 22px 10px; border-bottom: 1px solid #222; font-size: 1.6rem; font-weight: 700; }
        
        .rank { color: var(--gold); width: 70px; text-align: center; font-size: 1.8rem; font-family: 'Anton'; }
        .pts { text-align: right; color: var(--primary); font-size: 2.2rem; width: 110px; font-weight: 900; font-family: 'Anton'; }
        .team-tag { color: #777; font-size: 1rem; font-weight: 400; margin-left: 15px; font-style: italic; }

        footer {
            height: 10%; background: #111; display: flex; align-items: center;
            justify-content: space-between; padding: 0 50px; border-top: 2px solid #333;
        }
        .controls { display: flex; align-items: center; gap: 20px; }
        input[type="text"] { background: #000; border: 1px solid #444; color: #fff; padding: 12px; width: 400px; border-radius: 5px; font-size: 1rem; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; font-weight: 900; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .speed-box { display: flex; align-items: center; gap: 10px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="tv-canvas">
    <header>
        <img class="logo-img" src="https://i.postimg.cc/mD363K0P/1000030204.png" alt="MVP TV">
        <h1>Tournament Leaderboard</h1>
        <img class="logo-img" src="https://i.postimg.cc/fRF1X6R5/1000038471.png" alt="Fifth Ward">
    </header>

    <div class="main-stage">
        <div class="board">
            <div class="board-header">Player Standings</div>
            <div class="scroll-container" id="pCont">
                <div class="scroll-content" id="pList"></div>
            </div>
        </div>
        <div class="board">
            <div class="board-header">Team Rankings</div>
            <div class="scroll-container" id="tCont">
                <div class="scroll-content" id="tList"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="controls">
            <input type="text" id="sheetUrl" placeholder="Paste Google CSV/TSV Link Here">
            <button onclick="updateData()">Sync Data</button>
        </div>
        <div class="controls">
            <div class="speed-box">
                <span>Scroll Speed</span>
                <input type="range" id="speed" min="0" max="10" value="3">
            </div>
            <button id="pBtn" onclick="toggleScroll()" style="background:var(--gold)">Pause</button>
        </div>
        <div id="status" style="color:var(--primary); font-family:'Anton'">System Ready</div>
    </footer>
</div>

<script>
    let scrollPos = 0;
    let scrolling = true;

    function toggleScroll() {
        scrolling = !scrolling;
        document.getElementById('pBtn').innerText = scrolling ? "Pause" : "Resume";
    }

    async function updateData() {
        const url = document.getElementById('sheetUrl').value.trim();
        if(!url) return;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.split(/\r?\n/);
            let p = [], t = {};

            lines.forEach((l, i) => {
                if(i === 0 || !l.trim()) return;
                let c = l.split(/[\t,;]/);
                if(c.length >= 3) {
                    const name = c[0].trim(), team = c[1].trim() || "Independent", wins = parseInt(c[2]) || 0;
                    p.push({name, team, wins});
                    t[team] = (t[team] || 0) + wins;
                }
            });

            render(p, t);
            document.getElementById('status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        } catch(e) { alert("Check Link Format (Must be Published CSV)"); }
    }

    function render(players, teams) {
        players.sort((a,b) => b.wins - a.wins);
        const sortedT = Object.entries(teams).sort((a,b) => b[1] - a[1]);

        document.getElementById('pList').innerHTML = players.map((p, i) => `
            <table><tr><td class="rank">${i+1}</td><td>${p.name}<span class="team-tag">(${p.team})</span></td><td class="pts">${p.wins}</td></tr></table>
        `).join('');

        document.getElementById('tList').innerHTML = sortedT.map((t, i) => `
            <table><tr><td class="rank">${i+1}</td><td>${t[0]}</td><td class="pts">${t[1]}</td></tr></table>
        `).join('');
        scrollPos = 0;
    }

    function loop() {
        if(scrolling) {
            const speed = document.getElementById('speed').value / 10;
            const pList = document.getElementById('pList');
            const tList = document.getElementById('tList');
            const contH = document.getElementById('pCont').offsetHeight;

            if(pList.offsetHeight > contH) {
                scrollPos += speed;
                if(scrollPos > pList.offsetHeight + 50) scrollPos = -contH;
                pList.style.transform = `translateY(${-scrollPos}px)`;
                tList.style.transform = `translateY(${-scrollPos}px)`;
            }
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
