<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MVP TV - Tournament Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Force the whole page to a 16:9 canvas and prevent scrolling */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            aspect-ratio: 16 / 9;
        }

        /* Glass / Carbon Fiber background elements for a pro feel */
        .glass-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%),
                repeating-linear-gradient(45deg, #111 0px, #111 2px, #000 2px, #000 4px); /* Carbon fiber pattern */
            z-index: -1;
        }

        /* --- Header Section --- */
        header {
            width: 100%; height: 15%; /* Top 15% of the screen */
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border-bottom: 3px solid #00d4ff;
        }

        #mvp-logo { height: 70%; }
        #fw-logo { height: 90%; }
        header h1 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            font-size: 4em; color: #fff;
            letter-spacing: 5px; margin: 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* --- Main Content Section (Tables) --- */
        .main-stage {
            width: 100%; height: 80%; /* Takes up most of the 16:9 screen */
            display: flex; gap: 40px; justify-content: center;
            padding: 20px 40px 40px 40px; box-sizing: border-box;
        }

        .board {
            flex: 1; min-width: 0; /* Prevents overflow */
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #333; border-radius: 12px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            overflow: hidden; /* Contains the scroll */
        }

        /* The blue gold accent bars from your logos */
        .board::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #b8860b 0%, #ffd700 50%, #b8860b 100%);
            border-radius: 12px 12px 0 0;
        }

        h2 {
            text-align: center; font-size: 2em; text-transform: uppercase;
            letter-spacing: 3px; margin: 0 0 15px 0;
            color: #00d4ff; font-weight: 900;
        }

        /* --- Advanced Scroll Container --- */
        .scroll-window { flex-grow: 1; overflow-y: scroll; padding-right: 15px; }
        .scroll-window::-webkit-scrollbar { width: 10px; }
        .scroll-window::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 1.4em; }
        thead { position: sticky; top: 0; background: #0a0a0a; z-index: 10; }
        th { border-bottom: 2px solid #444; padding: 15px 10px; text-align: left; color: #aaa; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 18px 10px; border-bottom: 1px solid #222; vertical-align: middle; }

        /* The Bold Text and Points with Dynamic Color */
        .rank { font-weight: 900; color: #ffd700; width: 50px; text-align: center; }
        .points-col {
            text-align: right; font-weight: 900; font-size: 1.5em; width: 100px;
            color: #00d4ff; /* Digital Pool Cyan */
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }
        .player-name { font-weight: 700; font-size: 1em; color: #fff; }
        .team-label { color: #888; font-size: 0.8em; margin-left: 10px; font-weight: 400; }

        /* --- Footer (Admin / Sync) Section --- */
        footer {
            width: 100%; height: 5%; /* Bottom bar */
            display: flex; justify-content: center; align-items: center;
            background: #222; border-top: 1px solid #444; font-size: 0.8em;
        }
        #admin { position: absolute; top: 100px; left: 100px; background: #222; padding: 10px; border-radius: 5px; } /* Temporary visibility */

        /* Embedded Base64 Image Strings (Replace with actual data if needed) */
        const FW_LOGO_BASE64 = "YOUR_FIFTH_WARD_BASE64_HERE";
        const MVP_LOGO_BASE64 = "YOUR_MVP_TV_BASE64_HERE";
    </style>
</head>
<body>
    <div class="glass-overlay"></div>

    <header>
        <img id="fw-logo" src="data:image/png;base64,...(FW_BASE64)..." alt="FW Logo">
        <h1>Tournament Leaderboard</h1>
        <img id="mvp-logo" src="data:image/png;base64,...(MVP_BASE64)..." alt="MVP Logo">
    </header>

    <div class="main-stage">
        <div class="board">
            <h2>Player Leaderboard</h2>
            <div class="scroll-window">
                <table>
                    <thead><tr><th class="rank">#</th><th>Player (Team)</th><th class="points-col">Wins</th></tr></thead>
                    <tbody id="playerBody"></tbody>
                </table>
            </div>
        </div>

        <div class="board">
            <h2>Team Leaderboard</h2>
            <div class="scroll-window">
                <table>
                    <thead><tr><th class="rank">#</th><th>Team Name</th><th class="points-col">Total</th></tr></thead>
                    <tbody id="teamBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <input type="text" id="sheetUrl" placeholder="Paste your Google Sheets Published CSV link here...">
        <button onclick="fetchData()">Sync Leaderboard</button>
        <span id="status" style="margin-left:10px;">Status: Ready</span>
    </footer>

    <script>
        // The core sync logic from our previous session remains, optimized for this clean data source.
        async function fetchData() {
            const url = document.getElementById('sheetUrl').value.trim();
            const status = document.getElementById('status');
            if (!url) return;

            status.innerText = "Syncing...";

            try {
                const response = await fetch(url);
                const tsv = await response.text();
                const rows = tsv.split('\n').map(r => r.split('\t'));

                let players = [];
                let teamTotals = {};

                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i][0]?.trim();
                    const team = rows[i][1]?.trim() || "Independent";
                    const wins = parseInt(rows[i][2]) || 0;

                    if (name) {
                        players.push({ name, team, wins });
                        teamTotals[team] = (teamTotals[team] || 0) + wins;
                    }
                }

                render(players, teamTotals);
                status.innerText = "Updated: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
                status.innerText = "Sync Error: Check your published link.";
            }
        }

        function render(players, teamTotals) {
            // Player Render
            const pBody = document.getElementById('playerBody');
            players.sort((a,b) => b.wins - a.wins);
            pBody.innerHTML = players.map((p, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td><span class="player-name">${p.name}</span><span class="team-label">(${p.team})</span></td>
                    <td class="points-col">${p.wins}</td>
                </tr>
            `).join('');

            // Team Render
            const tBody = document.getElementById('teamBody');
            const sortedTeams = Object.entries(teamTotals).sort((a,b) => b[1] - a[1]);
            tBody.innerHTML = sortedTeams.map((t, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${t[0]}</td>
                    <td class="points-col">${t[1]}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
