<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shays Leaderboard - Google Sheets Sync</title>
    <style>
        /* Transparent for OBS */
        body {
            margin: 0; padding: 10px; background-color: rgba(0, 0, 0, 0); 
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
        }
        .flex-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .board {
            flex: 1; min-width: 320px; max-width: 500px;
            background: rgba(20, 20, 20, 0.9); border-radius: 10px;
            padding: 15px; border-top: 5px solid #00d4ff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }
        h2 { text-align: center; margin-top: 0; color: #00d4ff; text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid #333; padding: 10px; text-align: left; color: #aaa; font-size: 0.9em; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 1.1em; }
        .pts { text-align: right; font-weight: bold; color: #00d4ff; }
        #admin { background: #333; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 4px; }
        #status { font-size: 0.8em; color: #888; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="admin">
        <input type="text" id="sheetUrl" placeholder="Paste Google Sheets TSV Link Here...">
        <button onclick="fetchSheetData()">Sync Leaderboard</button>
    </div>

    <div class="flex-container">
        <div class="board">
            <h2>Player Standings</h2>
            <table>
                <thead><tr><th>Rank</th><th>Player</th><th class="pts">Wins</th></tr></thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>

        <div class="board">
            <h2>Team Rankings</h2>
            <table>
                <thead><tr><th>Rank</th><th>Team</th><th class="pts">Total</th></tr></thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>
    <div id="status">Ready to sync.</div>

    <script>
        async function fetchSheetData() {
            const url = document.getElementById('sheetUrl').value.trim();
            const status = document.getElementById('status');
            if (!url) return;

            status.innerText = "Syncing with Google Sheets...";

            try {
                const response = await fetch(url);
                const tsvData = await response.text();
                
                // Parse TSV rows
                const rows = tsvData.split('\n').map(row => row.split('\t'));
                
                let players = [];
                let teams = {};

                // Skip header (i=1)
                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i][0];
                    const teamName = rows[i][1] || "Independent";
                    const wins = parseInt(rows[i][2]) || 0;

                    if (name) {
                        players.push({ name, wins });
                        teams[teamName] = (teams[teamName] || 0) + wins;
                    }
                }

                render(players, teams);
                status.innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Check link and ensure 'Published to Web' as TSV.";
            }
        }

        function render(players, teams) {
            // Player Board
            const pBody = document.getElementById('playerBody');
            const sortedPlayers = players.sort((a,b) => b.wins - a.wins).slice(0, 15);
            pBody.innerHTML = sortedPlayers.map((p, i) => `
                <tr><td>${i+1}</td><td>${p.name}</td><td class="pts">${p.wins}</td></tr>
            `).join('');

            // Team Board
            const tBody = document.getElementById('teamBody');
            const sortedTeams = Object.entries(teams).sort((a,b) => b[1] - a[1]);
            tBody.innerHTML = sortedTeams.map((t, i) => `
                <tr><td>${i+1}</td><td>${t[0]}</td><td class="pts">${t[1]}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
