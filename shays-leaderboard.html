<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shays Leaderboard - OBS Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0); 
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
        }
        .flex-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .board {
            flex: 1; min-width: 300px; max-width: 500px;
            background: rgba(15, 15, 15, 0.95);
            border-radius: 8px; padding: 15px;
            border-top: 4px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; margin-top: 0; font-size: 1.2em; text-transform: uppercase; color: #00d4ff; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 1px solid #444; padding: 8px; text-align: left; font-size: 0.9em; color: #888; }
        td { padding: 8px; border-bottom: 1px solid #222; font-size: 1em; }
        .pts { text-align: right; font-weight: bold; color: #00d4ff; }
        .rank { width: 30px; font-weight: bold; color: #666; }
        #admin {
            background: #222; padding: 15px; margin-bottom: 15px;
            border-radius: 5px; display: flex; gap: 10px; align-items: center;
        }
        input { padding: 8px; flex-grow: 1; border-radius: 4px; border: 1px solid #444; background: #111; color: white; }
        button { padding: 8px 15px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="admin">
        <input type="text" id="urlInput" placeholder="Paste Digital Pool Stats URL...">
        <button onclick="startTracking()">Update Boards</button>
        <span id="status" style="margin-left:10px; font-size:0.8em; color: #ff4444;">Status: Waiting...</span>
    </div>

    <div class="flex-container">
        <div class="board">
            <h2>Player Wins</h2>
            <table>
                <thead>
                    <tr><th class="rank">#</th><th>Player</th><th class="pts">Wins</th></tr>
                </thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>

        <div class="board">
            <h2>Team Totals</h2>
            <table>
                <thead>
                    <tr><th class="rank">#</th><th>Team</th><th class="pts">Total</th></tr>
                </thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let interval;

        async function updateData() {
            let inputUrl = document.getElementById('urlInput').value.trim();
            if (!inputUrl) return;

            document.getElementById('status').style.color = "#888";
            document.getElementById('status').innerText = "Status: Fetching...";

            // Format to API URL
            let apiUrl = inputUrl;
            if (inputUrl.includes("digitalpool.com/tournaments/")) {
                const parts = inputUrl.split("tournaments/")[1].split("/");
                const slug = parts[0];
                apiUrl = `https://api.digitalpool.com/v1/tournaments/${slug}/stats`;
            }

            try {
                // Using a fallback proxy if the first one fails
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}&timestamp=${new Date().getTime()}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy connection failed");
                
                const result = await response.json();
                if (!result.contents) throw new Error("No data returned from proxy");

                const data = JSON.parse(result.contents);
                const statsList = data.stats || [];

                if (statsList.length === 0) {
                    document.getElementById('status').innerText = "Status: No data found in tournament.";
                    return;
                }

                let players = [];
                let teams = {};

                statsList.forEach(entry => {
                    const name = entry.player ? entry.player.name : "Unknown";
                    const teamName = (entry.team && entry.team.name) ? entry.team.name : "Independent";
                    const record = entry.gameRecord || "0-0";
                    const wins = parseInt(record.split('-')[0]) || 0;

                    players.push({ name, points: wins });
                    teams[teamName] = (teams[teamName] || 0) + wins;
                });

                render(players, teams);
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('status').innerText = "Status: Updated " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
                document.getElementById('status').style.color = "#ff4444";
                document.getElementById('status').innerText = "Status Error: " + e.message;
            }
        }

        function render(players, teams) {
            const pBody = document.getElementById('playerBody');
            const sortedPlayers = players.sort((a,b) => b.points - a.points).slice(0, 15);
            pBody.innerHTML = sortedPlayers.map((p, i) => `
                <tr><td class="rank">${i+1}</td><td>${p.name}</td><td class="pts">${p.points}</td></tr>
            `).join('');

            const tBody = document.getElementById('teamBody');
            const sortedTeams = Object.entries(teams).sort((a,b) => b[1] - a[1]);
            tBody.innerHTML = sortedTeams.map((t, i) => `
                <tr><td class="rank">${i+1}</td><td>${t[0]}</td><td class="pts">${t[1]}</td></tr>
            `).join('');
        }

        function startTracking() {
            updateData();
            if (interval) clearInterval(interval);
            interval = setInterval(updateData, 60000);
        }
    </script>
</body>
</html>
