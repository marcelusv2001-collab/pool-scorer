<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shays Leaderboard - Live Data</title>
    <style>
        body { margin: 0; padding: 10px; background-color: rgba(0, 0, 0, 0); font-family: sans-serif; color: white; text-shadow: 2px 2px 3px #000; }
        .flex-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .board { flex: 1; min-width: 300px; max-width: 500px; background: rgba(15, 15, 15, 0.95); border-radius: 8px; padding: 15px; border-top: 4px solid #00d4ff; }
        h2 { text-align: center; color: #00d4ff; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 1px solid #444; padding: 8px; text-align: left; color: #888; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        #admin { background: #222; padding: 15px; margin-bottom: 15px; border-radius: 5px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 4px; }
        #debug { font-size: 10px; color: #555; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="admin">
        <input type="text" id="urlInput" value="https://digitalpool.com/tournaments/shays-tourney/stats">
        <button onclick="updateData()">Update Boards</button>
    </div>

    <div class="flex-container">
        <div class="board">
            <h2>Player Wins</h2>
            <table>
                <thead><tr><th>#</th><th>Player</th><th style="text-align:right">Wins</th></tr></thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>
        <div class="board">
            <h2>Team Totals</h2>
            <table>
                <thead><tr><th>#</th><th>Team</th><th style="text-align:right">Total</th></tr></thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>
    
    <div id="debug">System Log: Waiting for input...</div>

    <script>
        async function updateData() {
            const status = document.getElementById('debug');
            let url = document.getElementById('urlInput').value.trim();
            
            status.innerText = "Connecting to proxy...";

            // Robust URL cleaning
            let slug = url.split('tournaments/')[1]?.split('/')[0];
            if(!slug) {
                status.innerText = "Error: Invalid URL format. Use https://digitalpool.com/tournaments/SLUG/stats";
                return;
            }

            const apiUrl = `https://api.digitalpool.com/v1/tournaments/${slug}/stats`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const response = await fetch(proxy);
                const result = await response.json();
                
                if (!result.contents) throw new Error("Proxy returned empty content.");
                
                const data = JSON.parse(result.contents);
                const stats = data.stats || [];

                if(stats.length === 0) {
                    status.innerText = "Connected, but no player stats were found. Is the tournament started?";
                    return;
                }

                let players = [];
                let teams = {};

                stats.forEach(s => {
                    const name = s.player?.name || "Unknown";
                    const team = s.team?.name || "Independent";
                    const wins = parseInt((s.gameRecord || "0").split('-')[0]) || 0;

                    players.push({ name, wins });
                    teams[team] = (teams[team] || 0) + wins;
                });

                // Sort and Render
                players.sort((a,b) => b.wins - a.wins);
                document.getElementById('playerBody').innerHTML = players.slice(0, 15).map((p, i) => 
                    `<tr><td>${i+1}</td><td>${p.name}</td><td style="text-align:right">${p.wins}</td></tr>`).join('');

                const sortedTeams = Object.entries(teams).sort((a,b) => b[1] - a[1]);
                document.getElementById('teamBody').innerHTML = sortedTeams.map((t, i) => 
                    `<tr><td>${i+1}</td><td>${t[0]}</td><td style="text-align:right">${t[1]}</td></tr>`).join('');

                status.innerText = "Last Success: " + new Date().toLocaleTimeString();

            } catch (e) {
                status.innerText = "Critical Error: " + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
