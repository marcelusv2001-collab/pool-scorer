<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shays Leaderboard - Live Sync</title>
    <style>
        body { margin: 0; padding: 20px; background-color: rgba(0,0,0,0); font-family: 'Segoe UI', sans-serif; color: white; }
        .flex-container { display: flex; gap: 30px; justify-content: center; }
        .board { 
            flex: 1; background: rgba(15, 15, 15, 0.9); border-radius: 10px; 
            padding: 20px; border-top: 4px solid #00d4ff; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #00d4ff; margin-top: 0; text-transform: uppercase; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid #333; padding: 10px; text-align: left; color: #888; font-size: 0.8em; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .pts { text-align: right; font-weight: bold; color: #00d4ff; }
        #admin { background: #222; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="admin">
        <input type="text" id="sheetUrl" placeholder="Paste Google Sheets Published TSV Link...">
        <button onclick="fetchData()">Update Boards</button>
    </div>

    <div class="flex-container">
        <div class="board">
            <h2>Player Leaderboard</h2>
            <table>
                <thead><tr><th>#</th><th>Player</th><th class="pts">Wins</th></tr></thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>

        <div class="board">
            <h2>Team Leaderboard</h2>
            <table>
                <thead><tr><th>#</th><th>Team</th><th class="pts">Total Wins</th></tr></thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchData() {
            const url = document.getElementById('sheetUrl').value.trim();
            if (!url) return;

            try {
                const response = await fetch(url);
                const tsv = await response.text();
                const rows = tsv.split('\n').map(r => r.split('\t'));

                let players = [];
                let teamTotals = {};

                // Process rows (Skip header i=0)
                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i][0]?.trim();
                    const team = rows[i][1]?.trim() || "Independent";
                    const wins = parseInt(rows[i][2]) || 0;

                    if (name) {
                        // Add to individual list
                        players.push({ name, wins });
                        
                        // Add to team sum
                        teamTotals[team] = (teamTotals[team] || 0) + wins;
                    }
                }

                render(players, teamTotals);
            } catch (e) {
                alert("Sync Error: Ensure the sheet is Published to Web as TSV.");
            }
        }

        function render(players, teamTotals) {
            // Render Players (Sorted by wins)
            players.sort((a,b) => b.wins - a.wins);
            document.getElementById('playerBody').innerHTML = players.map((p, i) => `
                <tr><td>${i+1}</td><td>${p.name}</td><td class="pts">${p.wins}</td></tr>
            `).join('');

            // Render Teams (Sorted by combined wins)
            const sortedTeams = Object.entries(teamTotals).sort((a,b) => b[1] - a[1]);
            document.getElementById('teamBody').innerHTML = sortedTeams.map((t, i) => `
                <tr><td>${i+1}</td><td>${t[0]}</td><td class="pts">${t[1]}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
